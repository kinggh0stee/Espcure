name: ESPHome Validate

on:
  pull_request:
    paths:
      - 'espcure.yaml'
      - 'secrets.yaml.example'
      - 'requirements.txt'
      - '.github/workflows/validate.yml'
  push:
    branches:
      - main
    paths:
      - 'espcure.yaml'
      - 'requirements.txt'

jobs:
  validate:
    name: esphome config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ESPHome
        run: pip install -r requirements.txt

      - name: Create CI secrets
        # secrets.yaml is gitignored — CI needs placeholder values so the
        # config parser can resolve !secret references without real credentials.
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "ci-test-network"
          wifi_password: "ci-test-password-32chars-placeholder"
          ap_password: "ci-test-ap"
          api_encryption_key: "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY="
          ota_password: "ci-test-ota-password"
          EOF

      - name: Validate ESPHome config
        run: esphome config espcure.yaml

  compile:
    name: esphome compile (${{ matrix.sensor }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # esphome config validates YAML but does NOT compile lambdas, so an
          # enum/method typo (e.g. the SHT heater API) only surfaces here. We
          # compile BOTH sensor variants so either sht_platform stays buildable.
          - sensor: SHT31
            overrides: "-s sht_platform sht3xd"
          - sensor: SHT45
            # sht4x has no on-demand heater API — the heater statements are
            # no-ops (";") so the Clear Sensor Condensation button still compiles.
            overrides: "-s sht_platform sht4x -s sht_heater_on ';' -s sht_heater_off ';'"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO & ESPHome build
        # The ESP-IDF toolchain is large; cache it so only the first run is slow.
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .esphome
          key: pio-${{ matrix.sensor }}-${{ hashFiles('espcure.yaml', 'requirements.txt') }}
          restore-keys: |
            pio-${{ matrix.sensor }}-

      - name: Install ESPHome
        run: pip install -r requirements.txt

      - name: Create CI secrets
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "ci-test-network"
          wifi_password: "ci-test-password-32chars-placeholder"
          ap_password: "ci-test-ap"
          api_encryption_key: "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY="
          ota_password: "ci-test-ota-password"
          EOF

      - name: Compile firmware (${{ matrix.sensor }})
        run: esphome ${{ matrix.overrides }} compile espcure.yaml
