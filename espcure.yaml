################################################################################
# EspCure — Thermoelectric Curing Chamber Controller
# Target board : ESP32-C6  (requires ESP-IDF framework)
# Sensor       : SHT31 or SHT45 (I²C 0x44, chamber temp/RH; no cold-plate sensor)
#                Selected via the `sht_platform` substitution below.
# Outputs      : 3× SSR-40 DD (fan rail / Peltier TECs / heater)
# Web UI       : http://espcure.local  (no Home Assistant required)
################################################################################

# ─── Build-time options ───────────────────────────────────────────────────────
# Chamber sensor select. Both the SHT31 and SHT45 use I²C address 0x44 and the
# same wiring — only the ESPHome platform and the on-chip heater API differ.
#
# To swap sensors, set the three substitutions below to match, then reflash.
# CI compiles BOTH variants on every PR, so a mismatch fails the build.
#
#   SHT31 (sht3xd) — has a real runtime heater toggle:
#     sht_platform:   sht3xd
#     sht_heater_on:  "id(sht45).set_heater_enabled(true);"
#     sht_heater_off: "id(sht45).set_heater_enabled(false);"
#
#   SHT45 (sht4x) — NO on-demand heater API exists (heater is config-time only),
#   so the Clear Sensor Condensation button just takes a fresh reading (no pulse):
#     sht_platform:   sht4x
#     sht_heater_on:  ";"
#     sht_heater_off: ";"
substitutions:
  # ─── Device identity ─────────────────────────────────────────────────────────
  # Running more than one EspCure on the same network/Home Assistant? Give each
  # unit its own name BEFORE flashing. `device_name` becomes the mDNS hostname
  # (http://<device_name>.local) and the prefix for every Home Assistant entity
  # ID, so it MUST be unique per unit and lowercase (letters, digits, hyphens).
  # `friendly_name` is the human-readable label shown in HA and the web UI.
  #
  #   Unit 1:  device_name: espcure      friendly_name: EspCure
  #   Unit 2:  device_name: espcure-2    friendly_name: EspCure 2
  device_name: espcure
  friendly_name: EspCure

  # Auto-unique naming. Set to "true" to append the device's MAC to the hostname
  # (e.g. espcure-a1b2c3.local) so EVERY flashed unit is unique with NO per-unit
  # editing — handy for flashing a batch from one config. Trade-off: you lose the
  # clean http://<device_name>.local address (use the MAC-suffixed one or the IP).
  # Leave "false" for a single unit or when you hand-pick `device_name` per unit.
  mac_suffix: "false"

  # Firmware version — single source of truth. Bump this on every release; it
  # feeds both esphome.project.version (boot log + HA device info) and the
  # "Firmware Version" diagnostic text sensor shown on the web UI.
  fw_version: "1.6.0"

  # Chamber sensor — SHT45 (sht4x) is ACTIVE. The sht4x platform has no
  # on-demand heater API, so the Clear Sensor Condensation button just takes a
  # fresh reading (the heater statements are no-ops).
  sht_platform:   sht4x
  sht_heater_on:  ";"
  sht_heater_off: ";"
  # SHT31 option — to switch back, comment the three sht4x lines above and
  # uncomment the three sht3xd lines below (SHT31 has a real runtime heater):
  # sht_platform:   sht3xd
  # sht_heater_on:  "id(sht45).set_heater_enabled(true);"
  # sht_heater_off: "id(sht45).set_heater_enabled(false);"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # Append the MAC to the hostname for automatic per-unit uniqueness (see the
  # `mac_suffix` substitution above). Default "false" keeps the clean hostname.
  name_add_mac_suffix: ${mac_suffix}
  comment: "Thermoelectric curing chamber — DIY Cannatrol"
  # Firmware version reported in the logs and Home Assistant device info.
  # Bump `version` on every release and tag it (e.g. v1.1.0).
  project:
    name: "kinggh0stee.espcure"
    version: "${fw_version}"
  on_boot:
    # Heat-only PID — put the climate in HEAT mode so the heater chases temperature
    # from boot. The Peltier is driven separately by the dew-point/VPD loop.
    - priority: -100
      then:
        - climate.control:
            id: temp_pid
            mode: HEAT
    # Apply restored PID number entity values so tuned gains survive reboots.
    # Must run after component init (lower priority = runs later).
    - priority: -200
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return id(pid_kd).state;

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# ─── Core services ────────────────────────────────────────────────────────────

# Coalesce NVS flash writes — the cool_bias Allende integrator updates every 20 s,
# so without this every tick would wear flash. 5 min batches the writes safely.
preferences:
  flash_write_interval: 5min

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none   # disable modem sleep — prevents ~15 min AP disconnects on some routers
  ap:
    ssid: "${friendly_name}-Setup"
    password: !secret ap_password

captive_portal:

# WiFi provisioning — required for Made for ESPHome compliance
# authorizer: page_button — hold the BOOT button (GPIO9) to authorize BLE provisioning
esp32_improv:
  authorizer: page_button

improv_serial:

# Device-hosted web UI — browse to http://espcure.local
# version: 3 provides a full React dashboard with dark mode toggle.
# local: true serves assets from flash (works without internet).
web_server:
  port: 80
  version: 3
  local: true
  # Group order = top-to-bottom on the device web page. Essentials first; the
  # set-once knobs cluster in "Setup & Tuning" and debug data in "Diagnostics"
  # at the bottom (both collapsible). NOTE: entity_category does NOT hide
  # entities from this page (it only affects Home Assistant); grouping + order
  # is the lever here. Truly unused entities use `internal: true` instead.
  sorting_groups:
    - id: grp_climate
      name: "Climate & Temperature"
      sorting_weight: 10
    - id: grp_humidity
      name: "Humidity & Dew Point"
      sorting_weight: 20
    - id: grp_programs
      name: "Cure Programs"
      sorting_weight: 30
    - id: grp_status
      name: "Status & Indicators"
      sorting_weight: 40
    - id: grp_setup
      name: "Setup & Tuning"
      sorting_weight: 80
    - id: grp_diag
      name: "Diagnostics"
      sorting_weight: 90

# ─── I²C (SHT31/SHT45 chamber sensor) ─────────────────────────────────────────
# SDA → GPIO21   SCL → GPIO22

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

# ─── Globals ──────────────────────────────────────────────────────────────────

globals:
  # Software frost guard — set when chamber_temp drops below min_chamber_temp floor
  - id: frost_active
    type: bool
    restore_value: false
    initial_value: "false"

  # Peltier cooling demand — tracks the Allende cooling loop state (duty > eps).
  # The Peltier is a float (ledc) output that can't be read back in lambda, so
  # this global is the single source of truth for "cold plate is condensing".
  - id: peltier_cooling
    type: bool
    restore_value: false
    initial_value: "false"

  # Last status-LED key applied (edge-trigger) so paint_status_led only issues a
  # light call on a real change (re-asserting every cycle would restart the
  # Frost Blink pulse). Keys: -2 = disabled, -1 = uninit, 0 = idle (purple),
  # 1 = frost (white blink), 2 = cured (green); 1000+day = 10-day dry program
  # (fades blue->green by day).
  - id: led_state
    type: int
    restore_value: false
    initial_value: "-1"

  # Set when a cure program completes (auto-off on the final day); holds the LED
  # solid green ("cured") until the next program starts. Cleared on program start.
  - id: cure_complete
    type: bool
    restore_value: true
    initial_value: "false"

  # Continuous Peltier duty (0.0–1.0) last commanded by the Allende loop.
  # A float ledc output can't be read back, so this mirrors it for the duty sensor.
  - id: peltier_duty
    type: float
    restore_value: false
    initial_value: "0.0"

  # Allende adaptive bias (integrator). Slowly learned steady-state correction —
  # restored across reboots so the chamber doesn't re-learn on every power cycle.
  # Starts at 1.0 (centred on the 0.5 proportional baseline). Clamped 0.0–3.0.
  - id: cool_bias
    type: float
    restore_value: true
    initial_value: "1.0"

  # 10-Day Dry program start timestamp (epoch seconds). Single authority for
  # elapsed-day computation. 0 = not yet anchored (filled on first valid-time tick
  # after the program is enabled). Restored so a reboot mid-program keeps the anchor.
  - id: dry10_start_epoch
    type: uint32_t
    restore_value: true
    initial_value: "0"

  # Guards the dry10_day on_value re-anchor against the day-advance interval's own
  # writes: the interval sets this true immediately before writing dry10_day, so the
  # re-anchor only fires on genuine manual/external edits.
  - id: dry10_day_internal
    type: bool
    restore_value: false
    initial_value: "false"

  # Dry floor -- set when chamber RH drops below min_chamber_rh; forces the Peltier
  # off (stop dehumidifying) until RH recovers. Mirrors frost_active.
  - id: dry_floor_active
    type: bool
    restore_value: false
    initial_value: "false"

# ─── Sensors ──────────────────────────────────────────────────────────────────

sensor:
  # ── Chamber air (SHT31 or SHT45) ─────────────────────────────────────────────
  # Platform set by the `sht_platform` substitution at the top of this file.
  # `precision`/`heater_max_duty` (sht4x) and `repeatability`/`heater_enabled`
  # (sht3xd) are omitted: both platforms default to highest-quality measurement
  # and on-chip heater OFF, which is exactly what we want. The "Clear Sensor
  # Condensation" button pulses the heater on-demand (heater API differs — see
  # that button below). id stays `sht45` so downstream id() refs are untouched.
  - platform: ${sht_platform}
    id: sht45
    address: 0x44
    update_interval: 30s
    temperature:
      id: chamber_temp
      name: "Chamber Temperature"
      device_class: temperature
      state_class: measurement
      icon: "mdi:thermometer"
      filters:
        - offset: 0.0        # calibrate after install (see docs/calibration.md)
      web_server:
        sorting_group_id: grp_climate
        sorting_weight: 1
    humidity:
      id: chamber_rh
      name: "Chamber Humidity"
      device_class: humidity
      state_class: measurement
      icon: "mdi:water-percent"
      filters:
        - offset: 0.0
      web_server:
        sorting_group_id: grp_humidity
        sorting_weight: 1

  # ── Derived humidity metrics ─────────────────────────────────────────────────

  # Dew point via Magnus formula — Cannatrol controls this, not raw RH
  - platform: template
    id: dew_point
    name: "Dew Point"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer-water"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh) || rh <= 0.0f) return NAN;
      float g = log(rh / 100.0f) + (17.625f * t) / (243.04f + t);
      return 243.04f * g / (17.625f - g);
    update_interval: 30s
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 2

  # Vapor Pressure Deficit — still computed (the OLED shows it), but VPD mode is
  # hidden from the UI, so this is internal: true (not on the web page or in HA).
  - platform: template
    id: vpd
    name: "Vapor Pressure Deficit"
    internal: true
    unit_of_measurement: "kPa"
    state_class: measurement
    icon: "mdi:waves"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh)) return NAN;
      float svp = 0.6108f * exp(17.27f * t / (t + 237.3f));
      return svp * (1.0f - rh / 100.0f);
    update_interval: 30s

  # Dew-point error vs setpoint (positive = too humid; NaN when in VPD mode)
  - platform: template
    id: dew_point_error
    name: "Dew Point Error"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer-alert"
    entity_category: diagnostic
    lambda: |-
      if (!id(use_dew_point_control).state) return NAN;
      if (isnan(id(dew_point).state)) return NAN;
      return id(dew_point).state - id(dew_point_setpoint).state;
    update_interval: 30s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 5

  # Peltier duty as a readable entity — reports the real continuous Allende duty
  # (0–100 %). Reads peltier_duty since a float ledc output can't be read back.
  - platform: template
    id: peltier_output_pct
    name: "Peltier (Dehumidify) Duty"
    unit_of_measurement: "%"
    state_class: measurement
    icon: "mdi:snowflake"
    entity_category: diagnostic
    lambda: |-
      return id(peltier_duty) * 100.0f;
    update_interval: 5s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 2

  # VPD error vs setpoint — internal: true (VPD mode is hidden from the UI)
  - platform: template
    id: vpd_error
    name: "VPD Error"
    internal: true
    unit_of_measurement: "kPa"
    state_class: measurement
    icon: "mdi:waves-arrow-up"
    lambda: |-
      if (!id(use_vpd_control).state) return NAN;
      if (isnan(id(vpd).state)) return NAN;
      return id(vpd).state - id(vpd_setpoint).state;
    update_interval: 30s

  # ── PID diagnostics (heat-only — Peltier is not driven by the PID) ───────────
  - platform: pid
    climate_id: temp_pid
    name: "PID Heat Output"
    type: HEAT
    entity_category: diagnostic
    icon: "mdi:fire"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 3
  - platform: pid
    climate_id: temp_pid
    name: "PID Integral"
    type: INTEGRAL
    entity_category: diagnostic
    icon: "mdi:sigma"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 4

  # Allende adaptive bias — diagnostic view of the integrator state. Useful for
  # confirming the loop is learning; a value pinned at 0 or 3 may indicate the
  # deadband is too wide or the gain too small. Reset via "Reset Cool Bias" button.
  - platform: template
    id: cool_bias_sensor
    name: "Cool Bias (Allende)"
    state_class: measurement
    icon: "mdi:sigma"
    entity_category: diagnostic
    lambda: 'return id(cool_bias);'
    update_interval: 5s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 6

  # ── System diagnostics ───────────────────────────────────────────────────────
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 7
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "WiFi Signal"
    device_class: signal_strength
    state_class: measurement
    entity_category: diagnostic
    update_interval: 60s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 8

# ─── Outputs ──────────────────────────────────────────────────────────────────

output:
  # TEC cooling — both Peltiers in parallel through one SSR-40 DD
  # GPIO18 → SSR-40 DD → TEC1 (+) || TEC2 (+) → 12 V PSU (−)
  - platform: ledc
    id: peltier_output
    pin:
      number: GPIO18
      inverted: false
    frequency: 15Hz

  # 12 V 50 W PTC heater with integrated 12 V fan
  # GPIO19 → SSR-40 DD → heater+fan 12 V supply
  # LEDC 15 Hz / 10-bit: finer PID resolution; SSR-40 DD handles this frequency cleanly
  - platform: ledc
    id: heater_output
    pin:
      number: GPIO19
      inverted: false
    frequency: 15Hz


# ─── Switches ─────────────────────────────────────────────────────────────────

switch:
  # Fan rail — all 3 fans together (2× TEC hot-side + heater fan)
  # GPIO5 → SSR-40 DD → fan rail 12 V (controlled by PID state — on when active, off when idle)
  # Auto-driven by the 2 s interval (on when Peltier cooling or heater heating);
  # diagnostic category so users don't toggle it expecting it to stick.
  - platform: gpio
    id: fan_relay
    name: "Chamber Fans"
    pin: GPIO5
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:fan"
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 10

  # Status LED enable — gates the 2 s status-LED loop. When ON (default), the
  # WS2812 automatically reflects the cooling/heating/idle/frost state. When
  # OFF, the loop turns the LED off and stops driving it (e.g. to kill the
  # glow in a dark room). Fan control is unaffected — it always runs.
  - platform: template
    id: status_led_enable
    name: "Status LED Enable"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: "mdi:led-on"
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 4
    # Repaint the LED the instant the switch is toggled (don't wait for the 2 s
    # interval) so turning it on/off feels immediate.
    on_turn_on:
      - script.execute: paint_status_led
    on_turn_off:
      - script.execute: paint_status_led

  # 10-day dew-point dry program (proven recipe — replaces the 24 h hang):
  #   Day 1   : ramp dew point 15.6 °C → 13.9 °C → 12.2 °C
  #   Days 2–5: hold 12.2 °C dew point
  #   Days 6–9: hold 11.1 °C dew point
  #   Day 10  : complete, auto-off
  - platform: template
    id: dry10_program_active
    name: "10-Day Dry Program"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:sprout"
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 3
    on_turn_on:
      - lambda: |-
          id(cure_complete) = false;         // starting fresh -- clear "cured"
          id(dry10_start_epoch) = 0;         // re-anchor on the next valid-time tick
      - number.set:
          id: dry10_day
          value: 0
      - number.set:
          id: dew_point_setpoint
          value: 15.6       # start of the 2-day ramp
      - climate.control:
          id: temp_pid
          target_temperature: 17.2    # 17.2 °C (63 °F)
      - switch.turn_on: use_dew_point_control
    on_turn_off:
      - lambda: id(dry10_start_epoch) = 0;

  # Humidity control mode — Dew Point (default).
  # The active mode drives the Peltier (cold-plate condensation), not a relay.
  # Mutually exclusive with VPD mode.
  - platform: template
    id: use_dew_point_control
    name: "Dew Point Control Mode"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: "mdi:thermometer-water"
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 4
    on_turn_on:
      - switch.turn_off: use_vpd_control

  # VPD control mode — internal: true. VPD is hidden from the UI (the build runs
  # Dew Point mode), so this switch can't be enabled; the VPD branch in the 20 s
  # loop is dead-but-harmless. Kept (not deleted) so re-enabling VPD is a
  # one-line revert. Still toggled off by use_dew_point_control's on_turn_on.
  - platform: template
    id: use_vpd_control
    name: "VPD Control Mode"
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:waves"
    on_turn_on:
      - switch.turn_off: use_dew_point_control

# ─── Numbers (user-adjustable setpoints) ──────────────────────────────────────

number:
  # ── Dew-point mode setpoints ─────────────────────────────────────────────────
  # Default 11.1 °C is a good all-around cure hold setpoint (low humidity, no frost risk)
  - platform: template
    id: dew_point_setpoint
    name: "Dew Point Setpoint"
    min_value: 4.0
    max_value: 18.0
    step: 0.1
    initial_value: 11.1    # cure-hold default; 10-Day Dry program overrides on start
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:target"
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 3

  # Allende deadband (repurposed from "Dew Point Hysteresis"). In Allende mode this
  # is the ± band that (a) gates bias adaptation — the integrator only ticks when
  # |error| > deadband, and (b) triggers the "satisfied cutoff" — the Peltier is
  # set to 0 when the dew point is already below setpoint by more than the deadband.
  - platform: template
    id: dew_point_hysteresis
    name: "Dew Point Deadband"
    min_value: 0.1
    max_value: 2.0
    step: 0.1
    initial_value: 0.1
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:tune"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 3

  # ── Frost floor ──────────────────────────────────────────────────────────────
  # PID suspends if chamber air drops below this — software-only, no cold-plate sensor
  - platform: template
    id: min_chamber_temp
    name: "Min Chamber Temperature (Frost Floor)"
    min_value: 1.0
    max_value: 10.0
    step: 0.5
    initial_value: 4.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:snowflake-alert"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 1

  # ── High-temperature safety ceiling ──────────────────────────────────────────
  # Heat-only PID can't cool, so this forces the Peltier ON above this limit
  # (independent of humidity mode). Default 27 °C — a safety net, well
  # above the normal 17–19 °C curing range.
  - platform: template
    id: max_chamber_temp
    name: "Max Chamber Temperature (Safety Ceiling)"
    min_value: 22.0
    max_value: 32.0
    step: 0.5
    initial_value: 27.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:fire-alert"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 2

  # ── Dry floor (minimum humidity) ─────────────────────────────────────────────
  # Symmetric with the frost floor. If chamber RH drops below this, the Peltier is
  # forced OFF (stop dehumidifying) until RH recovers (+3 % hysteresis). Default
  # 55 % never trips in normal operation (chamber runs ~65-75 %); a safety net
  # against over-drying. Max capped at 60 % so it can't chatter against normal RH.
  - platform: template
    id: min_chamber_rh
    name: "Min Chamber RH (Dry Floor)"
    min_value: 30.0
    max_value: 60.0
    step: 1.0
    initial_value: 55.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: "mdi:water-percent-alert"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 1.5

  # ── Cure program counters ────────────────────────────────────────────────────
  - platform: template
    id: dry10_day
    name: "10-Day Program Day"
    min_value: 0
    max_value: 10
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    icon: "mdi:calendar-today"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 9
    on_value:
      - script.execute: paint_status_led   # repaint the cure-progress color
      - lambda: |-
          // Ignore the day-advance interval's own writes; re-anchor only on
          // genuine manual/external edits so a hand-set day sticks (epoch is authority).
          if (id(dry10_day_internal)) { id(dry10_day_internal) = false; return; }
          if (!id(dry10_program_active).state) return;
          auto t = id(ha_time).now();
          if (!t.is_valid()) t = id(sntp_time).now();
          if (t.is_valid())
            id(dry10_start_epoch) = (uint32_t)t.timestamp - (uint32_t)((int)x * 86400);

  # ── Live PID tuning ──────────────────────────────────────────────────────────
  # Changing any coefficient immediately applies via set_control_parameters.
  # Tune from http://espcure.local or Home Assistant without reflashing.
  - platform: template
    id: pid_kp
    name: "PID Kp"
    min_value: 0.01
    max_value: 2.0
    step: 0.01
    initial_value: 0.35
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-p-circle"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 4
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return x;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return id(pid_kd).state;

  - platform: template
    id: pid_ki
    name: "PID Ki"
    min_value: 0.0
    max_value: 0.1
    step: 0.001
    initial_value: 0.005
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-i-circle"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 5
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return x;
            kd: !lambda return id(pid_kd).state;

  - platform: template
    id: pid_kd
    name: "PID Kd"
    min_value: 0.0
    max_value: 5.0
    step: 0.05
    initial_value: 1.2
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-d-circle"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 6
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return x;

  # ── Allende cooling controller gain ─────────────────────────────────────────
  # Proportional gain around the 0.5 duty baseline. Default 0.03125 (1/32) gives
  # ~3 % duty per °C of dew-point error — conservative for a Peltier that has
  # significant thermal inertia. Increase if the chamber is slow to respond.
  - platform: template
    id: allende_cool_gain
    name: "Cool Gain (Allende)"
    min_value: 0.0
    max_value: 0.2
    step: 0.005
    initial_value: 0.03125
    restore_value: true
    optimistic: true
    unit_of_measurement: "1/°C"
    icon: "mdi:snowflake-thermometer"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 10

  # ── VPD mode setpoints — internal: true (VPD mode is hidden from the UI) ──────
  - platform: template
    id: vpd_setpoint
    name: "VPD Setpoint"
    internal: true
    min_value: 0.1
    max_value: 2.0
    step: 0.05
    initial_value: 0.8
    restore_value: true
    optimistic: true
    unit_of_measurement: "kPa"
    icon: "mdi:target"

  - platform: template
    id: vpd_hysteresis
    name: "VPD Hysteresis"
    internal: true
    min_value: 0.02
    max_value: 0.3
    step: 0.02
    initial_value: 0.1
    restore_value: true
    optimistic: true
    unit_of_measurement: "kPa"
    icon: "mdi:tune"

# ─── Climate (Temperature PID) ────────────────────────────────────────────────

climate:
  # Heat-only PID: the heater chases temperature. The Peltier is NOT a PID output
  # — it is driven by the 20 s Allende cooling loop (cold-plate condensation).
  - platform: pid
    id: temp_pid
    name: "Temperature Control"
    sensor: chamber_temp
    icon: "mdi:thermometer"
    default_target_temperature: 17.2    # 17.2 °C (63 °F) — matches validated program default
    heat_output: heater_output
    web_server:
      sorting_group_id: grp_climate
      sorting_weight: 2
    control_parameters:
      # Starting values — run PID Autotune after install to refine for your fridge
      # Update pid_kp/ki/kd number entities after tuning (docs/pid-tuning.md)
      kp: 0.35
      ki: 0.005
      kd: 1.2
      max_integral: 1.0
      output_averaging_samples: 5
      derivative_averaging_samples: 5
    deadband_parameters:
      threshold_high: 0.5              # ±0.5 °C deadband
      threshold_low: -0.5
      kp_multiplier: 0.1
      ki_multiplier: 0.05
      kd_multiplier: 0.0

# ─── Time ─────────────────────────────────────────────────────────────────────
# Primary: Home Assistant (preferred when connected, matches HA local timezone).
# Fallback: SNTP (keeps cure-program day advancement alive during HA/API outages).
# The midnight cron has been removed -- day advancement is handled by the epoch-
# anchored 60 s interval below, which self-heals missed ticks and multi-day gaps.

time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time

# ─── Status LED painter (shared by the 2 s loop and the enable switch) ────────
# Extracted into a script so toggling "Status LED Enable" repaints the LED
# instantly instead of waiting up to 2 s for the next interval tick. Still
# edge-triggered via led_state so the Frost Blink pulse isn't restarted on
# every call. Colors: blue = cooling, red = heating, purple = idle,
# white blink = frost; off when the enable switch is OFF.

script:
  - id: paint_status_led
    then:
      - lambda: |-
          // Status LED disabled — turn it off once, then leave it alone.
          if (!id(status_led_enable).state) {
            if (id(led_state) != -2) {
              id(led_state) = -2;
              auto off = id(status_led).make_call();
              off.set_state(false);
              off.perform();
            }
            return;
          }
          // Resolve the desired visual as an edge-trigger key + color.
          // Priority: frost guard (safety) > active program (blue->green by day)
          // > cured (solid green) > idle (purple). All at half power (0.5).
          bool  frost = id(frost_active);
          int   key;
          float r = 1.0f, g = 0.0f, b = 1.0f;   // default = purple (idle)
          if (frost) {
            key = 1;
          } else if (id(dry10_program_active).state) {
            int   day   = (int)id(dry10_day).state;
            float total = 10.0f;
            int   base  = 1000;
            float p = day / total;              // 0 at start -> 1 at the final day
            if (p < 0.0f) p = 0.0f; else if (p > 1.0f) p = 1.0f;
            key = base + day;                   // unique per (program, day) -> repaint daily
            r = 0.0f; g = p; b = 1.0f - p;      // blue (day 0) -> green (cured)
          } else if (id(cure_complete)) {
            key = 2; r = 0.0f; g = 1.0f; b = 0.0f;   // solid green — cured
          } else {
            key = 0;                            // purple defaults already set
          }
          if (key == id(led_state)) return;
          id(led_state) = key;

          auto call = id(status_led).make_call();
          call.set_state(true);
          if (frost) {
            // White fast blink — no transition (incompatible with effects).
            call.set_rgb(1.0f, 1.0f, 1.0f);
            call.set_brightness(0.5f);
            call.set_effect("Frost Blink");
          } else {
            call.set_transition_length(300);
            call.set_effect("None");
            call.set_rgb(r, g, b);
            call.set_brightness(0.5f);
          }
          call.perform();

# ─── Interval automations ─────────────────────────────────────────────────────

interval:
  # Allende self-tuning cooling loop (20 s) — drives the PELTIER (cold-plate
  # condensation). Priority: frost guard → high-temp ceiling → dew-point mode → off.
  # VPD control is internal/hidden (dead branch removed here; VPD entities remain
  # in the file untouched for a one-line revert per the existing project convention).
  - interval: 20s
    then:
      - lambda: |-
          const float PELTIER_ON_EPS = 0.01f;

          // 1) Frost guard — hard override; never cool below the floor. Bias frozen.
          if (id(frost_active)) {
            id(peltier_cooling) = false;
            id(peltier_duty) = 0.0f;
            id(peltier_output).set_level(0.0f);
            return;
          }
          // 2) High-temp safety ceiling — heat-only PID can't cool, so force full.
          //    Fan ON in the same pass (hot-side airflow).
          if (!isnan(id(chamber_temp).state) &&
              id(chamber_temp).state > id(max_chamber_temp).state) {
            id(peltier_cooling) = true;
            id(peltier_duty) = 1.0f;
            id(fan_relay).turn_on();
            id(peltier_output).set_level(1.0f);
            return;
          }
          // 3) No active cooling mode (VPD is dead/internal) — Peltier idle, bias frozen.
          if (!id(use_dew_point_control).state) {
            id(peltier_cooling) = false;
            id(peltier_duty) = 0.0f;
            id(peltier_output).set_level(0.0f);
            return;
          }
          // 4) Sensor fault — fail safe to OFF; do NOT adapt bias on bad data.
          if (isnan(id(dew_point).state)) {
            id(peltier_cooling) = false;
            id(peltier_duty) = 0.0f;
            id(peltier_output).set_level(0.0f);
            return;
          }
          // 5) Dry floor -- stop condensing if chamber RH has fallen to the floor.
          //    Hysteresis: trip below min_chamber_rh, release above min + 3 %.
          //    Bias frozen (we return before the integrator). RH is valid here --
          //    dew_point is derived from RH, so a NaN RH was caught at step 4.
          {
            const float DRY_FLOOR_RECOVER = 3.0f;   // %RH release band
            float rh       = id(chamber_rh).state;
            float rh_floor = id(min_chamber_rh).state;
            if (!id(dry_floor_active) && rh < rh_floor) {
              id(dry_floor_active) = true;
              ESP_LOGW("espcure", "Dry floor reached (%.0f%% < %.0f%%) -- Peltier suspended", rh, rh_floor);
            } else if (id(dry_floor_active) && rh > rh_floor + DRY_FLOOR_RECOVER) {
              id(dry_floor_active) = false;
              ESP_LOGI("espcure", "Chamber RH recovered (%.0f%%) -- Peltier may resume", rh);
            }
          }
          if (id(dry_floor_active)) {
            id(peltier_cooling) = false;
            id(peltier_duty) = 0.0f;
            id(peltier_output).set_level(0.0f);
            return;
          }

          // ---- Allende (self-tuning) ----
          float error = id(dew_point).state - id(dew_point_setpoint).state; // + = too humid
          float db    = id(dew_point_hysteresis).state;   // +/- deadband (repurposed)
          float gain  = id(allende_cool_gain).state;
          float bias  = id(cool_bias);

          // Adaptive bias (integrator): tick == 20 s.
          if (error > db)       bias += 0.01f;
          else if (error < -db) bias -= 0.01f;
          if (bias > 3.0f) bias = 3.0f;
          if (bias < 0.0f) bias = 0.0f;
          id(cool_bias) = bias;

          // Proportional output around the 0.5 baseline, scaled by bias.
          float out = (0.5f + error * gain) * bias;

          // Satisfied cutoff (deliberate safety refinement, not verbatim Allende):
          // already drier than target, stop condensing instead of waiting on slow
          // bias decay (the 0.5 baseline would otherwise keep the TEC running).
          if (error < -db) out = 0.0f;

          if (out < 0.0f) out = 0.0f;
          if (out > 1.0f) out = 1.0f;

          id(peltier_duty) = out;
          bool cooling = out > PELTIER_ON_EPS;
          id(peltier_cooling) = cooling;
          if (cooling) id(fan_relay).turn_on();   // fan invariant: airflow whenever TEC runs
          id(peltier_output).set_level(out);

  # Software frost guard (60 s)
  # No cold-plate sensor — uses chamber air as proxy.
  # Frost forces the PELTIER (cooling path) OFF below min_chamber_temp and lets it
  # resume at floor + 2 °C. The heat-only PID is left running — heating helps
  # recover from a frost event.
  - interval: 60s
    then:
      - lambda: |-
          if (isnan(id(chamber_temp).state)) return;
          float t     = id(chamber_temp).state;
          float floor = id(min_chamber_temp).state;
          if (!id(frost_active) && t < floor) {
            id(frost_active) = true;
            ESP_LOGW("espcure", "Frost floor reached (%.1f°C <= %.1f°C) — Peltier suspended", t, floor);
            id(peltier_cooling) = false;
            id(peltier_duty) = 0.0f;
            id(peltier_output).set_level(0.0f);
          } else if (id(frost_active) && t > floor + 2.0f) {
            id(frost_active) = false;
            ESP_LOGI("espcure", "Chamber recovered (%.1f°C) — Peltier may resume", t);
            // The 20 s Allende loop re-engages the Peltier on its next pass.
          }

  # 10-Day Dry -- epoch-anchored day advancement (60 s). Replaces the deleted
  # midnight cron. Self-heals missed ticks and multi-day gaps: elapsed days are
  # computed from the restored program-start epoch against whichever time source
  # is valid. Writes dew_point_setpoint for the current day; the dry floor (20 s
  # loop) may still hold the Peltier off -- the SETPOINT advances regardless.
  - interval: 60s
    then:
      - lambda: |-
          if (!id(dry10_program_active).state) return;

          // Resolve a valid time: prefer HA, fall back to SNTP.
          auto t = id(ha_time).now();
          if (!t.is_valid()) t = id(sntp_time).now();
          if (!t.is_valid()) return;                 // no time yet -- retry next tick
          uint32_t now_ts = (uint32_t) t.timestamp;

          // Anchor on the first valid tick after the program was enabled.
          if (id(dry10_start_epoch) == 0) {
            id(dry10_start_epoch) = now_ts;          // day 0 (15.6 C) already applied on start
            return;
          }

          // Clock-skew guard: if time stepped BACKWARD past the anchor (e.g. an HA
          // time correction), unsigned subtraction would underflow to a huge value
          // and falsely complete the program. Re-anchor and wait instead.
          if (now_ts < id(dry10_start_epoch)) {
            id(dry10_start_epoch) = now_ts;
            return;
          }
          int elapsed = (int)((now_ts - id(dry10_start_epoch)) / 86400);
          if (elapsed == (int)id(dry10_day).state) return;   // no day change

          // Program complete (also covers a multi-day catch-up jump past day 10).
          if (elapsed >= 10) {
            id(dry10_day_internal) = true;
            auto dc = id(dry10_day).make_call(); dc.set_value(10.0f); dc.perform();
            id(cure_complete) = true;
            id(dry10_program_active).turn_off();
            ESP_LOGI("espcure", "10-Day Dry complete (elapsed %d d) -- auto-off", elapsed);
            return;
          }

          // Advance directly to the current day (jumps intermediate days on catch-up).
          id(dry10_day_internal) = true;
          auto dc = id(dry10_day).make_call(); dc.set_value((float)elapsed); dc.perform();

          float dp;
          if      (elapsed == 0) dp = 15.6f;   // ramp origin
          else if (elapsed == 1) dp = 13.9f;   // mid-ramp
          else if (elapsed <= 5) dp = 12.2f;   // dry hold (days 2-5)
          else                   dp = 11.1f;   // cure hold (days 6-9)
          auto sp = id(dew_point_setpoint).make_call(); sp.set_value(dp); sp.perform();
          ESP_LOGI("espcure", "10-Day Dry advanced to day %d -- DP setpoint %.1f", elapsed, dp);

  # Fan + Status LED refresh (2 s)
  # Fan: runs continuously while a cure program is active (air circulation for
  #   even drying); otherwise on when the Peltier is cooling OR the heater is
  #   heating; off when idle with no program.
  # LED (when enabled via Status LED Enable):
  #   Blue = cooling (Peltier) · Red = heating · Purple = idle · White blink = frost
  - interval: 2s
    then:
      - lambda: |-
          // Fan runs unconditionally every cycle. Continuous circulation while a
          // cure program is active; otherwise on only when cooling or heating.
          bool program = id(dry10_program_active).state;
          bool cooling = id(peltier_cooling);
          bool heating = id(temp_pid).action == esphome::climate::CLIMATE_ACTION_HEATING;
          if (program || cooling || heating) {
            id(fan_relay).turn_on();
          } else {
            id(fan_relay).turn_off();
          }
      # LED is painted by the shared script (also fired instantly when the
      # Status LED Enable switch is toggled, so the toggle isn't laggy).
      - script.execute: paint_status_led

# ─── Buttons ──────────────────────────────────────────────────────────────────

button:
  # PID autotune — hold chamber at setpoint for a few hours before running
  - platform: template
    name: "PID Autotune"
    icon: "mdi:auto-fix"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 7
    on_press:
      - climate.pid.autotune:
          id: temp_pid
          noiseband: 0.25
          positive_output: 1.0
          negative_output: 0.0   # heat-only: no cool_output; off is the correct low state

  - platform: restart
    name: "Restart Controller"
    icon: "mdi:restart"
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 11

  # Pulse the on-chip heater briefly to clear condensation from the sensor face,
  # then take a clean reading. The heater statements come from the `sht_heater_on`
  # / `sht_heater_off` substitutions (top of file) so the same button compiles for
  # either sensor. On the SHT31 they toggle the runtime heater; on the SHT45 they
  # are no-ops (the sht4x platform has no on-demand heater API), so the button just
  # refreshes the reading. CI compiles both variants to keep them in sync.
  - platform: template
    name: "Clear Sensor Condensation"
    icon: "mdi:heat-wave"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 8
    on_press:
      - lambda: |-
          ESP_LOGI("espcure", "Clear Sensor Condensation: applying sensor heater (if supported)");
          ${sht_heater_on}
      - component.update: sht45
      - delay: 1000ms
      - lambda: |-
          ${sht_heater_off}
          ESP_LOGI("espcure", "Clear Sensor Condensation: taking a fresh reading");
      - component.update: sht45

  # Manually resets the Allende bias integrator to 1.0 (centred).
  # Use this if the bias has drifted to an extreme (0 or 3) — for example after a
  # long frost event or if the chamber setup changes significantly.
  - platform: template
    name: "Reset Cool Bias"
    icon: "mdi:restart"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 11
    on_press:
      - lambda: 'id(cool_bias) = 1.0f;'

# ─── Binary sensors ───────────────────────────────────────────────────────────

binary_sensor:
  - platform: status
    name: "Controller Online"
    icon: "mdi:wifi-check"
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 9

  # Live safety state — promoted near the top of the page (Status & Indicators)
  - platform: template
    name: "Frost Floor Active"
    device_class: problem
    lambda: return id(frost_active);
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 1

  # BOOT button (GPIO9, built into ESP32-C6 DevKitC-1) — cycles display pages.
  # INPUT_PULLUP + inverted: no extra hardware needed. internal: true keeps it
  # off the web page / HA; the on_click automation and the esp32_improv
  # authorizer still work (both reference the id, not the API exposure).
  - platform: gpio
    id: page_button
    name: "Display Page Button"
    internal: true
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - display.page.show_next: oled
        - component.update: oled

# ─── Text sensors ─────────────────────────────────────────────────────────────

text_sensor:
  # Firmware version (from the fw_version substitution / esphome.project.version)
  - platform: template
    name: "Firmware Version"
    icon: "mdi:tag-outline"
    entity_category: diagnostic
    lambda: 'return std::string("${fw_version}");'
    update_interval: 60s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 1

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 12

  # Human-readable chamber operating state (shown on web UI dashboard)
  - platform: template
    id: chamber_status
    name: "Chamber Status"
    icon: "mdi:information-outline"
    lambda: |-
      if (id(frost_active)) return std::string("Frost Guard");
      if (id(dry_floor_active)) return std::string("Dry Floor");
      if (id(peltier_cooling)) return std::string("Cooling");
      if (id(temp_pid).action == esphome::climate::CLIMATE_ACTION_HEATING) return std::string("Heating");
      return std::string("Idle");
    update_interval: 30s
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 2

  # Active humidity control mode with live setpoint readout — internal: true.
  # Still read by the OLED page-2 lambda; hidden from the web page / HA since the
  # mode toggles are no longer user-facing (Dew Point is the only active mode).
  - platform: template
    id: humidity_control_mode
    name: "Humidity Control Mode"
    internal: true
    icon: "mdi:water-check"
    lambda: |-
      char buf[48];
      if (id(use_vpd_control).state) {
        snprintf(buf, sizeof(buf), "VPD Mode %.2f kPa SP", id(vpd_setpoint).state);
      } else if (id(use_dew_point_control).state) {
        snprintf(buf, sizeof(buf), "Dew Point %.1f\xc2\xb0""C SP", id(dew_point_setpoint).state);
      } else {
        snprintf(buf, sizeof(buf), "Humidity control off");
      }
      return std::string(buf);
    update_interval: 30s
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 7

  # 10-day dry program progress
  - platform: template
    id: dry10_program_status
    name: "10-Day Program Status"
    icon: "mdi:sprout"
    lambda: |-
      if (!id(dry10_program_active).state) return std::string("Inactive");
      char buf[56];
      int day = (int)id(dry10_day).state;
      const char *phase;
      if (day <= 1)      phase = "Ramp\xe2\x86\x92""12.2\xc2\xb0""C";
      else if (day <= 5) phase = "Dry 12.2\xc2\xb0""C";
      else               phase = "Cure 11.1\xc2\xb0""C";
      snprintf(buf, sizeof(buf), "Day %d/10 \xe2\x80\x94 %s", day + 1, phase);
      return std::string(buf);
    update_interval: 30s
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 4

# ─── Display (SSD1306 0.96" OLED — optional) ─────────────────────────────────
# Requires an SSD1306 or SH1106 I²C OLED wired to the existing I²C bus:
#   OLED VCC → 3.3V   OLED GND → GND
#   OLED SDA → GPIO21  OLED SCL → GPIO22  (same pins as SHT45 — no conflict)
#
# Fonts are downloaded from Google Fonts at compile time (internet required).
# See docs/display-plan.md for ST7789 TFT wiring and alternative font options.

font:
  - file: "gfonts://Roboto"
    id: font_s
    size: 9
  - file: "gfonts://Roboto"
    id: font_m
    size: 13
  - file: "gfonts://Roboto"
    id: font_l
    size: 20

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    rotation: 0°
    update_interval: 5s
    pages:

      # Page 1 — primary readings
      - id: page_main
        lambda: |-
          if (isnan(id(chamber_temp).state)) {
            it.printf(0, 24, id(font_m), "Sensor init...");
            return;
          }
          // Row 1: Temp (large, left) + RH (large, right)
          it.printf(0,  0, id(font_l), "%.1f\xc2\xb0""C", id(chamber_temp).state);
          it.printf(68, 0, id(font_l), "%.0f%%", id(chamber_rh).state);
          // Row 2: Dew point actual (left) + DP setpoint (right)
          it.printf(0,  24, id(font_s), "DP %.1f\xc2\xb0""C", id(dew_point).state);
          it.printf(68, 24, id(font_s), "SP %.1f\xc2\xb0""C", id(dew_point_setpoint).state);
          // Row 3: DP error (left) + chamber status (right)
          if (!isnan(id(dew_point_error).state)) {
            it.printf(0, 35, id(font_s), "Err %+.1f\xc2\xb0""C", id(dew_point_error).state);
          }
          it.printf(68, 35, id(font_s), "%s", id(chamber_status).state.c_str());
          // Divider
          it.line(0, 46, 128, 46);
          // Bottom row: frost guard / active program day / standby
          if (id(frost_active)) {
            it.printf(0, 49, id(font_s), "FROST GUARD ACTIVE");
          } else if (id(dry10_program_active).state) {
            it.printf(0, 49, id(font_s), "10d Day %d  T%.0f\xc2\xb0""C",
                      (int)id(dry10_day).state + 1, id(temp_pid).target_temperature);
          } else {
            it.printf(0, 49, id(font_s), "T %.0f\xc2\xb0""C  Standby",
                      id(temp_pid).target_temperature);
          }

      # Page 2 — humidity control & setpoints
      - id: page_control
        lambda: |-
          it.printf(0,  0, id(font_m), "Control");
          it.line(0, 15, 128, 15);
          it.printf(0, 18, id(font_s), "%s", id(humidity_control_mode).state.c_str());
          it.printf(0, 30, id(font_s), "Temp SP %.1f\xc2\xb0""C", id(temp_pid).target_temperature);
          it.printf(0, 42, id(font_s), "Frost floor %.0f\xc2\xb0""C", id(min_chamber_temp).state);
          it.printf(0, 54, id(font_s), "WiFi %d dBm", (int)id(wifi_signal_sensor).state);

      # Page 3 — active cure program
      - id: page_programs
        lambda: |-
          it.printf(0,  0, id(font_m), "Programs");
          it.line(0, 15, 128, 15);
          it.printf(0, 18, id(font_s), "10d: %s", id(dry10_program_status).state.c_str());
          if (!isnan(id(dew_point_error).state)) {
            it.printf(0, 30, id(font_s), "DP err %+.1f\xc2\xb0""C", id(dew_point_error).state);
          }

# ─── Status LED (WS2812 RGB, built into ESP32-C6 DevKitC-1 on GPIO8) ─────────
# Color code:
#   Cooling  → blue              Heating → red (dim)
#   Idle     → purple (half power)
#   Frost    → white fast blink
#   Off      → Status LED Enable switch OFF

light:
  # internal: true — the LED is driven entirely by paint_status_led and gated by
  # the "Status LED Enable" switch, which is the single user control. Exposing a
  # second toggle (this light) fought the painter: turning the light off left the
  # edge-triggered loop with nothing to re-assert, so it "toggled off and not on".
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    internal: true
    pin: GPIO8
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 300ms
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Frost Blink"
          transition_length: 150ms
          update_interval: 350ms
          min_brightness: 0%
          max_brightness: 60%

