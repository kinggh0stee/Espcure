################################################################################
# EspCure — Thermoelectric Curing Chamber Controller
# Target board : ESP32-C6  (requires ESP-IDF framework)
# Sensor       : SHT45 (I²C, chamber temp/RH only — no cold-plate sensor)
# Outputs      : Peltier SSR-40 DD, heater relay, dehumidifier relay, fan relay
################################################################################

esphome:
  name: espcure
  friendly_name: EspCure
  comment: "Thermoelectric curing chamber — DIY Cannatrol"
  on_boot:
    priority: -100
    then:
      - switch.turn_on: fan_relay

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# ─── Core services ────────────────────────────────────────────────────────────

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "EspCure-Setup"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

# ─── I²C (SHT45 chamber sensor) ───────────────────────────────────────────────
# SDA → GPIO21   SCL → GPIO22

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

# ─── Globals ──────────────────────────────────────────────────────────────────

globals:
  # Software frost guard — set when chamber_temp drops below min_chamber_temp floor
  - id: frost_active
    type: bool
    restore_value: false
    initial_value: "false"

# ─── Sensors ──────────────────────────────────────────────────────────────────

sensor:
  # Chamber air temperature & humidity (SHT45)
  - platform: sht4x
    address: 0x44
    precision: High
    heater_max_duty: 0.0    # on-chip heater off by default; use Clear Sensor Condensation button
    update_interval: 30s
    temperature:
      id: chamber_temp
      name: "Chamber Temperature"
      filters:
        - offset: 0.0        # adjust after calibration (see docs/calibration.md)
    humidity:
      id: chamber_rh
      name: "Chamber Humidity"
      filters:
        - offset: 0.0        # adjust after calibration

  # Dew point — derived from chamber T + RH (Magnus formula)
  # Cannatrol targets dew point, not raw RH. This is the primary humidity metric.
  - platform: template
    id: dew_point
    name: "Dew Point"
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-water"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh) || rh <= 0.0f) return NAN;
      float g = log(rh / 100.0f) + (17.625f * t) / (243.04f + t);
      return 243.04f * g / (17.625f - g);
    update_interval: 30s

  # Vapor Pressure Deficit — derived metric for monitoring
  - platform: template
    id: vpd
    name: "Vapor Pressure Deficit"
    unit_of_measurement: "kPa"
    icon: "mdi:waves"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh)) return NAN;
      float svp = 0.6108f * exp(17.27f * t / (t + 237.3f));
      return svp * (1.0f - rh / 100.0f);
    update_interval: 30s

  # PID monitoring (diagnostic)
  - platform: pid
    climate_id: temp_pid
    name: "PID Cool Output"
    type: COOL
  - platform: pid
    climate_id: temp_pid
    name: "PID Heat Output"
    type: HEAT

  # System diagnostics
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

# ─── Outputs ──────────────────────────────────────────────────────────────────

output:
  # Peltier SSR — slow PWM avoids thermal stress from rapid switching
  # GPIO18 → SSR-40 DD (DC-DC SSR) → Peltier positive rail (12 V)
  - platform: slow_pwm
    id: peltier_output
    pin:
      number: GPIO18
      inverted: false
    period: 20s

  # 12 V 50 W PTC ceramic heater with integrated 12 V fan (87.5×60×42 mm)
  # Fan and heater share one 12 V connector — both cycle with this relay
  # GPIO19 → 5 V relay module (SRD-05VDC-SL-C) → heater+fan 12 V supply
  - platform: slow_pwm
    id: heater_output
    pin:
      number: GPIO19
      inverted: false
    period: 20s

# ─── Switches ─────────────────────────────────────────────────────────────────

switch:
  # Circulation fans — always on during operation
  - platform: gpio
    id: fan_relay
    name: "Chamber Fans"
    pin: GPIO5
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:fan"

  # Dehumidifier relay (optional — Peltier condensation alone may suffice)
  - platform: gpio
    id: dehumidifier_relay
    name: "Dehumidifier"
    pin: GPIO23
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:water-off"

  # Cure program (auto humidity step-down 78 % → 60 %, -1 %/day)
  - platform: template
    id: cure_program_active
    name: "Cure Program"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:sprout"
    on_turn_on:
      - number.set:
          id: program_day
          value: 0
      - number.set:
          id: humidity_setpoint
          value: 78

  # Dew point control mode — when ON, dehumidifier is driven by dew point setpoint
  # (Cannatrol style). When OFF, uses raw RH setpoint (rollitup style).
  - platform: template
    id: use_dew_point_control
    name: "Dew Point Control Mode"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:thermometer-water"

# ─── Numbers (user-adjustable setpoints) ──────────────────────────────────────

number:
  - platform: template
    id: humidity_setpoint
    name: "Humidity Setpoint"
    min_value: 55
    max_value: 85
    step: 1
    initial_value: 78
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: "mdi:water-percent"

  - platform: template
    id: humidity_hysteresis
    name: "Humidity Hysteresis"
    min_value: 1
    max_value: 5
    step: 0.5
    initial_value: 2.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: "mdi:tune"

  - platform: template
    id: program_day
    name: "Cure Program Day"
    min_value: 0
    max_value: 30
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    icon: "mdi:calendar-today"

  # Dew point setpoint — used when Dew Point Control Mode is ON
  # Cannatrol defaults: 12.2 °C (54 °F) for dry, 11.1 °C (52 °F) for cure
  - platform: template
    id: dew_point_setpoint
    name: "Dew Point Setpoint"
    min_value: 4.0
    max_value: 18.0
    step: 0.1
    initial_value: 11.1    # 52 °F — Cannatrol cure default
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-water"

  - platform: template
    id: dew_point_hysteresis
    name: "Dew Point Hysteresis"
    min_value: 0.1
    max_value: 2.0
    step: 0.1
    initial_value: 0.5
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:tune"

  # Software frost floor — PID disables if chamber drops below this temperature
  # Prevents over-cooling without a cold-plate sensor. Default 4 °C (39 °F).
  - platform: template
    id: min_chamber_temp
    name: "Min Chamber Temperature (Frost Floor)"
    min_value: 1.0
    max_value: 10.0
    step: 0.5
    initial_value: 4.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:snowflake-alert"

# ─── Climate (Temperature PID) ────────────────────────────────────────────────

climate:
  - platform: pid
    id: temp_pid
    name: "Chamber Temperature"
    sensor: chamber_temp
    default_target_temperature: 12.8    # 55 °F — rollitup default; use 20 °C for Cannatrol style
    cool_output: peltier_output
    heat_output: heater_output
    control_parameters:
      # Starting values — run PID Autotune after install to refine for your fridge
      kp: 0.35
      ki: 0.005
      kd: 1.2
      max_integral: 1.0
      output_averaging_samples: 5
      derivative_averaging_samples: 5
    deadband_parameters:
      threshold_high: 0.5              # ±0.5 °C deadband
      threshold_low: -0.5
      kp_multiplier: 0.1
      ki_multiplier: 0.05
      kd_multiplier: 0.0

# ─── Time (Home Assistant — drives daily cure step) ───────────────────────────

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - cron: "0 0 * * *"              # midnight daily
        then:
          - if:
              condition:
                switch.is_on: cure_program_active
              then:
                - lambda: |-
                    float sp = id(humidity_setpoint).state;
                    if (sp > 60.0f) {
                      auto call = id(humidity_setpoint).make_call();
                      call.set_value(sp - 1.0f);
                      call.perform();
                      auto dc = id(program_day).make_call();
                      dc.set_value(id(program_day).state + 1.0f);
                      dc.perform();
                    } else {
                      id(cure_program_active).turn_off();
                    }

# ─── Interval automations ─────────────────────────────────────────────────────

interval:
  # Humidity/dew-point bang-bang control
  # Dew Point Control Mode ON  → Cannatrol style (target dew point °C)
  # Dew Point Control Mode OFF → rollitup style (target % RH)
  - interval: 30s
    then:
      - lambda: |-
          bool on = id(dehumidifier_relay).state;
          if (id(use_dew_point_control).state) {
            if (isnan(id(dew_point).state)) return;
            float dp   = id(dew_point).state;
            float sp   = id(dew_point_setpoint).state;
            float hyst = id(dew_point_hysteresis).state / 2.0f;
            if (!on && dp > sp + hyst)
              id(dehumidifier_relay).turn_on();
            else if (on && dp < sp - hyst)
              id(dehumidifier_relay).turn_off();
          } else {
            if (isnan(id(chamber_rh).state)) return;
            float rh   = id(chamber_rh).state;
            float sp   = id(humidity_setpoint).state;
            float hyst = id(humidity_hysteresis).state / 2.0f;
            if (!on && rh > sp + hyst)
              id(dehumidifier_relay).turn_on();
            else if (on && rh < sp - hyst)
              id(dehumidifier_relay).turn_off();
          }

  # Software frost guard — no cold-plate sensor, so we use chamber air temperature
  # as a floor. If chamber drops below min_chamber_temp, PID is suspended until
  # temperature recovers 2 °C above the floor.
  - interval: 60s
    then:
      - lambda: |-
          if (isnan(id(chamber_temp).state)) return;
          float t     = id(chamber_temp).state;
          float floor = id(min_chamber_temp).state;
          if (!id(frost_active) && t < floor) {
            id(frost_active) = true;
            ESP_LOGW("espcure", "Frost floor reached (%.1f°C <= %.1f°C) — PID suspended", t, floor);
            auto call = id(temp_pid).make_call();
            call.set_mode("OFF");
            call.perform();
          } else if (id(frost_active) && t > floor + 2.0f) {
            id(frost_active) = false;
            ESP_LOGI("espcure", "Chamber recovered (%.1f°C) — PID resumed", t);
            auto call = id(temp_pid).make_call();
            call.set_mode("HEAT_COOL");
            call.perform();
          }

# ─── Buttons ──────────────────────────────────────────────────────────────────

button:
  - platform: template
    name: "PID Autotune"
    icon: "mdi:auto-fix"
    on_press:
      - climate.pid.autotune:
          id: temp_pid
          noiseband: 0.25
          positive_output: 1.0
          negative_output: -1.0

  - platform: restart
    name: "Restart Controller"

  # Pulse the SHT45 on-chip heater to clear condensation from the sensor face
  - platform: template
    name: "Clear Sensor Condensation"
    icon: "mdi:heat-wave"
    on_press:
      - lambda: |-
          ESP_LOGI("espcure", "SHT45 condensation-clear heater pulse triggered");

# ─── Binary sensors ───────────────────────────────────────────────────────────

binary_sensor:
  - platform: status
    name: "Controller Online"

  - platform: template
    name: "Frost Floor Active"
    lambda: return id(frost_active);

# ─── Text sensors ─────────────────────────────────────────────────────────────

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
