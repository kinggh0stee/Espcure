################################################################################
# EspCure — Thermoelectric Curing Chamber Controller
# Target board : ESP32-C6  (requires ESP-IDF framework)
# Sensor       : SHT45 (I²C, chamber temp/RH only — no cold-plate sensor)
# Outputs      : 3× SSR-40 DD (fan rail / Peltier TECs / heater)
# Web UI       : http://espcure.local  (no Home Assistant required)
################################################################################

esphome:
  name: espcure
  friendly_name: EspCure
  comment: "Thermoelectric curing chamber — DIY Cannatrol"
  on_boot:
    - priority: -100
      then:
        - switch.turn_on: fan_relay
    # Apply restored PID number entity values so tuned gains survive reboots.
    # Must run after component init (lower priority = runs later).
    - priority: -200
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return id(pid_kd).state;

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# ─── Core services ────────────────────────────────────────────────────────────

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "EspCure-Setup"
    password: !secret ap_password

captive_portal:

# WiFi provisioning — required for Made for ESPHome compliance
# authorizer: page_button — hold the BOOT button (GPIO9) to authorize BLE provisioning
esp32_improv:
  authorizer: page_button

improv_serial:

# Device-hosted web UI — browse to http://espcure.local
# version: 3 provides a full React dashboard with dark mode toggle.
# local: true serves assets from flash (works without internet).
web_server:
  port: 80
  version: 3
  local: true

# ─── I²C (SHT45 chamber sensor) ───────────────────────────────────────────────
# SDA → GPIO21   SCL → GPIO22

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

# ─── Globals ──────────────────────────────────────────────────────────────────

globals:
  # Software frost guard — set when chamber_temp drops below min_chamber_temp floor
  - id: frost_active
    type: bool
    restore_value: false
    initial_value: "false"

  # Cannatrol 4+4 program phase: 0 = dry (days 1–4), 1 = cure (days 5–8)
  - id: cannatrol_phase
    type: int
    restore_value: true
    initial_value: "0"

# ─── Sensors ──────────────────────────────────────────────────────────────────

sensor:
  # ── Chamber air (SHT45) ──────────────────────────────────────────────────────
  - platform: sht4x
    address: 0x44
    precision: High
    heater_max_duty: 0.0    # on-chip heater off by default; use "Clear Condensation" button
    update_interval: 30s
    temperature:
      id: chamber_temp
      name: "Chamber Temperature"
      device_class: temperature
      state_class: measurement
      filters:
        - offset: 0.0        # calibrate after install (see docs/calibration.md)
    humidity:
      id: chamber_rh
      name: "Chamber Humidity"
      device_class: humidity
      state_class: measurement
      filters:
        - offset: 0.0

  # Chamber temperature in °F — Cannatrol display convention
  - platform: template
    id: chamber_temp_f
    name: "Chamber Temperature (°F)"
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer"
    lambda: |-
      if (isnan(id(chamber_temp).state)) return NAN;
      return id(chamber_temp).state * 9.0f / 5.0f + 32.0f;
    update_interval: 30s

  # ── Derived humidity metrics ─────────────────────────────────────────────────

  # Dew point via Magnus formula — Cannatrol controls this, not raw RH
  - platform: template
    id: dew_point
    name: "Dew Point"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer-water"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh) || rh <= 0.0f) return NAN;
      float g = log(rh / 100.0f) + (17.625f * t) / (243.04f + t);
      return 243.04f * g / (17.625f - g);
    update_interval: 30s

  # Vapor Pressure Deficit — plant stress indicator
  - platform: template
    id: vpd
    name: "Vapor Pressure Deficit"
    unit_of_measurement: "kPa"
    state_class: measurement
    icon: "mdi:waves"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh)) return NAN;
      float svp = 0.6108f * exp(17.27f * t / (t + 237.3f));
      return svp * (1.0f - rh / 100.0f);
    update_interval: 30s

  # RH error vs setpoint (positive = too humid; NaN when in dew-point or VPD mode)
  - platform: template
    id: humidity_error
    name: "Humidity Error"
    unit_of_measurement: "%"
    state_class: measurement
    icon: "mdi:water-alert"
    entity_category: diagnostic
    lambda: |-
      if (id(use_dew_point_control).state) return NAN;
      if (id(use_vpd_control).state) return NAN;
      if (isnan(id(chamber_rh).state)) return NAN;
      return id(chamber_rh).state - id(humidity_setpoint).state;
    update_interval: 30s

  # Dew-point error vs setpoint (positive = too humid; NaN when in RH or VPD mode)
  - platform: template
    id: dew_point_error
    name: "Dew Point Error"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer-alert"
    entity_category: diagnostic
    lambda: |-
      if (!id(use_dew_point_control).state) return NAN;
      if (id(use_vpd_control).state) return NAN;
      if (isnan(id(dew_point).state)) return NAN;
      return id(dew_point).state - id(dew_point_setpoint).state;
    update_interval: 30s

  # ── PID diagnostics ──────────────────────────────────────────────────────────
  - platform: pid
    climate_id: temp_pid
    name: "PID Cool Output"
    type: COOL
    entity_category: diagnostic
  - platform: pid
    climate_id: temp_pid
    name: "PID Heat Output"
    type: HEAT
    entity_category: diagnostic
  - platform: pid
    climate_id: temp_pid
    name: "PID Integral"
    type: INTEGRAL
    entity_category: diagnostic

  # ── System diagnostics ───────────────────────────────────────────────────────
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "WiFi Signal"
    device_class: signal_strength
    state_class: measurement
    entity_category: diagnostic
    update_interval: 60s

# ─── Outputs ──────────────────────────────────────────────────────────────────

output:
  # TEC cooling — both Peltiers in parallel through one SSR-40 DD
  # GPIO18 → SSR-40 DD → TEC1 (+) || TEC2 (+) → 12 V PSU (−)
  - platform: slow_pwm
    id: peltier_output
    pin:
      number: GPIO18
      inverted: false
    period: 20s    # never reduce below 10 s — rapid cycling destroys Peltier junctions

  # 12 V 50 W PTC heater with integrated 12 V fan
  # GPIO19 → SSR-40 DD → heater+fan 12 V supply
  - platform: slow_pwm
    id: heater_output
    pin:
      number: GPIO19
      inverted: false
    period: 20s


# ─── Switches ─────────────────────────────────────────────────────────────────

switch:
  # Fan rail — all 3 fans together (2× TEC hot-side + heater fan)
  # GPIO5 → SSR-40 DD → fan rail 12 V (always on at boot)
  - platform: gpio
    id: fan_relay
    name: "Chamber Fans"
    pin: GPIO5
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:fan"

  # Dehumidifier relay — Peltier condensation alone often suffices
  - platform: gpio
    id: dehumidifier_relay
    name: "Dehumidifier"
    pin: GPIO23
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:water-off"

  # 18-day slow cure program: humidity steps -1 %/day from 78 % → 60 %
  - platform: template
    id: cure_program_active
    name: "Cure Program (18-day)"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:sprout"
    on_turn_on:
      - switch.turn_off: cannatrol_program_active  # only one program at a time
      - switch.turn_off: use_dew_point_control     # 18-day program uses RH mode
      - number.set:
          id: program_day
          value: 0
      - number.set:
          id: humidity_setpoint
          value: 78

  # Cannatrol 4+4 program: 4 days dry (12.2 °C DP) then 4 days cure (11.1 °C DP)
  - platform: template
    id: cannatrol_program_active
    name: "Cannatrol 4+4 Program"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:cannabis"
    on_turn_on:
      - switch.turn_off: cure_program_active       # only one program at a time
      - number.set:
          id: cannatrol_day
          value: 0
      - lambda: id(cannatrol_phase) = 0;
      - number.set:
          id: dew_point_setpoint
          value: 12.2       # 54 °F — Cannatrol dry profile
      - climate.control:
          id: temp_pid
          target_temperature: 20.0    # 68 °F
      - switch.turn_on: use_dew_point_control

  # Humidity control mode toggle:
  # OFF → rollitup style (bang-bang on % RH vs humidity_setpoint)
  # ON  → Cannatrol style (bang-bang on dew point °C vs dew_point_setpoint)
  - platform: template
    id: use_dew_point_control
    name: "Dew Point Control Mode"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:thermometer-water"
    on_turn_on:
      - switch.turn_off: use_vpd_control

  # VPD control mode — bang-bang on Vapor Pressure Deficit (kPa)
  # Highest-priority humidity mode: overrides dew-point and RH modes.
  # Low VPD = too humid → dehumidify; High VPD = too dry → humidify.
  - platform: template
    id: use_vpd_control
    name: "VPD Control Mode"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:waves"
    on_turn_on:
      - switch.turn_off: use_dew_point_control

# ─── Numbers (user-adjustable setpoints) ──────────────────────────────────────

number:
  # ── RH mode setpoints ────────────────────────────────────────────────────────
  - platform: template
    id: humidity_setpoint
    name: "Humidity Setpoint"
    min_value: 55
    max_value: 85
    step: 1
    initial_value: 78
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: "mdi:water-percent"

  - platform: template
    id: humidity_hysteresis
    name: "Humidity Hysteresis"
    min_value: 1
    max_value: 5
    step: 0.5
    initial_value: 2.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: "mdi:tune"

  # ── Dew-point mode setpoints ─────────────────────────────────────────────────
  # Cannatrol defaults: 12.2 °C (54 °F) for dry, 11.1 °C (52 °F) for cure
  - platform: template
    id: dew_point_setpoint
    name: "Dew Point Setpoint"
    min_value: 4.0
    max_value: 18.0
    step: 0.1
    initial_value: 11.1    # 52 °F — Cannatrol cure default
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-water"

  - platform: template
    id: dew_point_hysteresis
    name: "Dew Point Hysteresis"
    min_value: 0.1
    max_value: 2.0
    step: 0.1
    initial_value: 0.5
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:tune"

  # ── Frost floor ──────────────────────────────────────────────────────────────
  # PID suspends if chamber air drops below this — software-only, no cold-plate sensor
  - platform: template
    id: min_chamber_temp
    name: "Min Chamber Temperature (Frost Floor)"
    min_value: 1.0
    max_value: 10.0
    step: 0.5
    initial_value: 4.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:snowflake-alert"

  # ── Cure program counters ────────────────────────────────────────────────────
  - platform: template
    id: program_day
    name: "Cure Program Day"
    min_value: 0
    max_value: 30
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    icon: "mdi:calendar-today"

  - platform: template
    id: cannatrol_day
    name: "Cannatrol Program Day"
    min_value: 0
    max_value: 9
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    icon: "mdi:calendar-today"

  # ── Live PID tuning ──────────────────────────────────────────────────────────
  # Changing any coefficient immediately applies via set_control_parameters.
  # Tune from http://espcure.local or Home Assistant without reflashing.
  - platform: template
    id: pid_kp
    name: "PID Kp"
    min_value: 0.01
    max_value: 2.0
    step: 0.01
    initial_value: 0.35
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-p-circle"
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return x;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return id(pid_kd).state;

  - platform: template
    id: pid_ki
    name: "PID Ki"
    min_value: 0.0
    max_value: 0.1
    step: 0.001
    initial_value: 0.005
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-i-circle"
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return x;
            kd: !lambda return id(pid_kd).state;

  - platform: template
    id: pid_kd
    name: "PID Kd"
    min_value: 0.0
    max_value: 5.0
    step: 0.05
    initial_value: 1.2
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-d-circle"
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return x;

  # ── VPD mode setpoints ───────────────────────────────────────────────────────
  - platform: template
    id: vpd_setpoint
    name: "VPD Setpoint"
    min_value: 0.1
    max_value: 2.0
    step: 0.05
    initial_value: 0.8
    restore_value: true
    optimistic: true
    unit_of_measurement: "kPa"
    icon: "mdi:waves"

  - platform: template
    id: vpd_hysteresis
    name: "VPD Hysteresis"
    min_value: 0.02
    max_value: 0.3
    step: 0.02
    initial_value: 0.1
    restore_value: true
    optimistic: true
    unit_of_measurement: "kPa"
    icon: "mdi:tune"

# ─── Climate (Temperature PID) ────────────────────────────────────────────────

climate:
  - platform: pid
    id: temp_pid
    name: "Chamber Temperature"
    sensor: chamber_temp
    default_target_temperature: 12.8    # 55 °F — rollitup cold-plate method
    cool_output: peltier_output
    heat_output: heater_output
    control_parameters:
      # Starting values — run PID Autotune after install to refine for your fridge
      # Update pid_kp/ki/kd number entities after tuning (docs/pid-tuning.md)
      kp: 0.35
      ki: 0.005
      kd: 1.2
      max_integral: 1.0
      output_averaging_samples: 5
      derivative_averaging_samples: 5
    deadband_parameters:
      threshold_high: 0.5              # ±0.5 °C deadband
      threshold_low: -0.5
      kp_multiplier: 0.1
      ki_multiplier: 0.05
      kd_multiplier: 0.0

# ─── Time (Home Assistant — drives daily cure program steps) ──────────────────

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - cron: "0 0 0 * * *"    # midnight daily (ESPHome cron: sec min hour dom mon dow)
        then:
          # 18-day step-down: -1 %RH/day until 60 %
          - if:
              condition:
                switch.is_on: cure_program_active
              then:
                - lambda: |-
                    float sp = id(humidity_setpoint).state;
                    if (sp > 60.0f) {
                      auto call = id(humidity_setpoint).make_call();
                      call.set_value(sp - 1.0f);
                      call.perform();
                      auto dc = id(program_day).make_call();
                      dc.set_value(id(program_day).state + 1.0f);
                      dc.perform();
                    } else {
                      id(cure_program_active).turn_off();
                    }

          # Cannatrol 4+4: days 1-4 dry (12.2 °C DP), days 5-8 cure (11.1 °C DP)
          - if:
              condition:
                switch.is_on: cannatrol_program_active
              then:
                - lambda: |-
                    int day = (int)id(cannatrol_day).state + 1;
                    auto dc = id(cannatrol_day).make_call();
                    dc.set_value((float)day);
                    dc.perform();
                    if (day <= 4) {
                      id(cannatrol_phase) = 0;
                      auto sp = id(dew_point_setpoint).make_call();
                      sp.set_value(12.2f);
                      sp.perform();
                    } else if (day <= 8) {
                      id(cannatrol_phase) = 1;
                      auto sp = id(dew_point_setpoint).make_call();
                      sp.set_value(11.1f);
                      sp.perform();
                    } else {
                      id(cannatrol_program_active).turn_off();
                    }

# ─── Interval automations ─────────────────────────────────────────────────────

interval:
  # Humidity bang-bang control loop (30 s)
  # Priority order: VPD mode → Dew Point mode → RH mode
  # All modes control the dehumidifier relay only (downward control).
  - interval: 30s
    then:
      - lambda: |-
          bool on = id(dehumidifier_relay).state;
          if (id(use_vpd_control).state) {
            if (isnan(id(vpd).state)) return;
            float v    = id(vpd).state;
            float sp   = id(vpd_setpoint).state;
            float hyst = id(vpd_hysteresis).state / 2.0f;
            // Low VPD = too humid → dehumidify; no humidifier in this build
            if (!on && v < sp - hyst) id(dehumidifier_relay).turn_on();
            else if (on && v > sp + hyst) id(dehumidifier_relay).turn_off();
          } else if (id(use_dew_point_control).state) {
            if (isnan(id(dew_point).state)) return;
            float dp   = id(dew_point).state;
            float sp   = id(dew_point_setpoint).state;
            float hyst = id(dew_point_hysteresis).state / 2.0f;
            if (!on && dp > sp + hyst) id(dehumidifier_relay).turn_on();
            else if (on && dp < sp - hyst) id(dehumidifier_relay).turn_off();
          } else {
            if (isnan(id(chamber_rh).state)) return;
            float rh   = id(chamber_rh).state;
            float sp   = id(humidity_setpoint).state;
            float hyst = id(humidity_hysteresis).state / 2.0f;
            if (!on && rh > sp + hyst) id(dehumidifier_relay).turn_on();
            else if (on && rh < sp - hyst) id(dehumidifier_relay).turn_off();
          }

  # Software frost guard (60 s)
  # No cold-plate sensor — uses chamber air as proxy.
  # PID suspends below min_chamber_temp, resumes at floor + 2 °C.
  - interval: 60s
    then:
      - lambda: |-
          if (isnan(id(chamber_temp).state)) return;
          float t     = id(chamber_temp).state;
          float floor = id(min_chamber_temp).state;
          if (!id(frost_active) && t < floor) {
            id(frost_active) = true;
            ESP_LOGW("espcure", "Frost floor reached (%.1f°C <= %.1f°C) — PID suspended", t, floor);
            auto call = id(temp_pid).make_call();
            call.set_mode("OFF");
            call.perform();
          } else if (id(frost_active) && t > floor + 2.0f) {
            id(frost_active) = false;
            ESP_LOGI("espcure", "Chamber recovered (%.1f°C) — PID resumed", t);
            auto call = id(temp_pid).make_call();
            call.set_mode("HEAT_COOL");
            call.perform();
          }

  # Status LED update (2 s)
  # Blue = cooling · Red = heating · Green (dim) = idle · White blink = frost
  - interval: 2s
    then:
      - lambda: |-
          auto call = id(status_led).make_call();
          call.set_transition_length(300);
          if (id(frost_active)) {
            // White fast blink — frost guard active
            call.set_state(true);
            call.set_rgb(1.0f, 1.0f, 1.0f);
            call.set_brightness(0.5f);
            call.set_effect("Frost Blink");
          } else {
            call.set_effect("None");
            auto act = id(temp_pid).action;
            switch (act) {
              case esphome::climate::CLIMATE_ACTION_COOLING:
                call.set_state(true);
                call.set_rgb(0.0f, 0.3f, 1.0f);   // blue
                call.set_brightness(0.7f);
                break;
              case esphome::climate::CLIMATE_ACTION_HEATING:
                call.set_state(true);
                call.set_rgb(1.0f, 0.15f, 0.0f);  // red
                call.set_brightness(0.5f);
                break;
              case esphome::climate::CLIMATE_ACTION_IDLE:
                call.set_state(true);
                call.set_rgb(0.0f, 1.0f, 0.0f);   // green very dim
                call.set_brightness(0.04f);
                break;
              default:
                call.set_state(false);
                break;
            }
          }
          call.perform();

# ─── Buttons ──────────────────────────────────────────────────────────────────

button:
  # PID autotune — hold chamber at setpoint for a few hours before running
  - platform: template
    name: "PID Autotune"
    icon: "mdi:auto-fix"
    on_press:
      - climate.pid.autotune:
          id: temp_pid
          noiseband: 0.25
          positive_output: 1.0
          negative_output: -1.0

  - platform: restart
    name: "Restart Controller"

  # Pulse the SHT45 on-chip heater briefly to clear condensation from sensor face
  - platform: template
    name: "Clear Sensor Condensation"
    icon: "mdi:heat-wave"
    on_press:
      - lambda: |-
          ESP_LOGI("espcure", "SHT45 condensation-clear heater pulse triggered");

  # ── Cannatrol one-tap presets ────────────────────────────────────────────────
  # Apply full profile: temp + dew point setpoints + enable dew-point mode.

  - platform: template
    name: "Apply Dry Profile"
    icon: "mdi:weather-sunny"
    on_press:
      then:
        - number.set:
            id: dew_point_setpoint
            value: 12.2        # 54 °F — Cannatrol dry
        - climate.control:
            id: temp_pid
            target_temperature: 20.0   # 68 °F
        - switch.turn_on: use_dew_point_control

  - platform: template
    name: "Apply Cure Profile"
    icon: "mdi:leaf"
    on_press:
      then:
        - number.set:
            id: dew_point_setpoint
            value: 11.1        # 52 °F — Cannatrol cure
        - climate.control:
            id: temp_pid
            target_temperature: 20.0   # 68 °F
        - switch.turn_on: use_dew_point_control

  - platform: template
    name: "Apply Cold-Plate Profile"
    icon: "mdi:snowflake-thermometer"
    on_press:
      then:
        - climate.control:
            id: temp_pid
            target_temperature: 12.8   # 55 °F — rollitup cold-plate method
        - switch.turn_off: use_dew_point_control

# ─── Binary sensors ───────────────────────────────────────────────────────────

binary_sensor:
  - platform: status
    name: "Controller Online"

  - platform: template
    name: "Frost Floor Active"
    device_class: problem
    lambda: return id(frost_active);

  # BOOT button (GPIO9, built into ESP32-C6 DevKitC-1) — cycles display pages.
  # INPUT_PULLUP + inverted: no extra hardware needed.
  - platform: gpio
    id: page_button
    name: "Display Page Button"
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    entity_category: diagnostic
    on_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - display.page.show_next: oled
        - component.update: oled

# ─── Text sensors ─────────────────────────────────────────────────────────────

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic

  # Human-readable chamber operating state (shown on web UI dashboard)
  - platform: template
    id: chamber_status
    name: "Chamber Status"
    icon: "mdi:information-outline"
    lambda: |-
      if (id(frost_active)) return std::string("Frost Guard");
      auto action = id(temp_pid).action;
      if (action == esphome::climate::CLIMATE_ACTION_COOLING) return std::string("Cooling");
      if (action == esphome::climate::CLIMATE_ACTION_HEATING) return std::string("Heating");
      if (action == esphome::climate::CLIMATE_ACTION_IDLE)    return std::string("Idle");
      return std::string("Off");
    update_interval: 30s

  # Active humidity control mode with live setpoint readout
  - platform: template
    id: humidity_control_mode
    name: "Humidity Control Mode"
    icon: "mdi:water-check"
    lambda: |-
      char buf[48];
      if (id(use_vpd_control).state) {
        snprintf(buf, sizeof(buf), "VPD Mode %.2f kPa SP", id(vpd_setpoint).state);
      } else if (id(use_dew_point_control).state) {
        snprintf(buf, sizeof(buf), "Dew Point %.1f\xc2\xb0C SP", id(dew_point_setpoint).state);
      } else {
        snprintf(buf, sizeof(buf), "RH Mode %.0f%% SP", id(humidity_setpoint).state);
      }
      return std::string(buf);
    update_interval: 30s

  # 18-day program progress
  - platform: template
    id: cure_program_status
    name: "Cure Program Status"
    icon: "mdi:sprout"
    lambda: |-
      if (!id(cure_program_active).state) return std::string("Inactive");
      char buf[48];
      snprintf(buf, sizeof(buf), "Day %.0f \xe2\x80\x94 %.0f%% RH target",
               id(program_day).state + 1.0f, id(humidity_setpoint).state);
      return std::string(buf);
    update_interval: 30s

  # Cannatrol 4+4 program progress
  - platform: template
    id: cannatrol_program_status
    name: "Cannatrol Program Status"
    icon: "mdi:cannabis"
    lambda: |-
      if (!id(cannatrol_program_active).state) return std::string("Inactive");
      char buf[56];
      int day = (int)id(cannatrol_day).state;
      if (id(cannatrol_phase) == 0) {
        // days 0-3 display as Day 1/4 – Day 4/4; day=4 is transitional (still dry)
        int d = (day + 1 <= 4) ? day + 1 : 4;
        snprintf(buf, sizeof(buf), "Dry Phase \xe2\x80\x94 Day %d/4 (12.2\xc2\xb0C DP)", d);
      } else {
        // cure days start at cannatrol_day=5; day-4 gives 1-4
        snprintf(buf, sizeof(buf), "Cure Phase \xe2\x80\x94 Day %d/4 (11.1\xc2\xb0C DP)", day - 4);
      }
      return std::string(buf);
    update_interval: 30s

# ─── Display (SSD1306 0.96" OLED — optional) ─────────────────────────────────
# Requires an SSD1306 or SH1106 I²C OLED wired to the existing I²C bus:
#   OLED VCC → 3.3V   OLED GND → GND
#   OLED SDA → GPIO21  OLED SCL → GPIO22  (same pins as SHT45 — no conflict)
#
# Fonts are downloaded from Google Fonts at compile time (internet required).
# See docs/display-plan.md for ST7789 TFT wiring and alternative font options.

font:
  - file: "gfonts://Roboto"
    id: font_s
    size: 9
  - file: "gfonts://Roboto"
    id: font_m
    size: 13
  - file: "gfonts://Roboto"
    id: font_l
    size: 20

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    rotation: 0°
    update_interval: 5s
    pages:

      # Page 1 — primary readings
      - id: page_main
        lambda: |-
          if (isnan(id(chamber_temp).state)) {
            it.printf(0, 24, id(font_m), "Sensor init...");
            return;
          }
          // Temp (large, left half)
          it.printf(0,  0, id(font_l), "%.1f\xc2\xb0", id(chamber_temp).state);
          // RH (large, right half)
          it.printf(68, 0, id(font_l), "%.0f%%", id(chamber_rh).state);
          // Dew point
          it.printf(0, 26, id(font_s), "DP %.1f\xc2\xb0C", id(dew_point).state);
          // VPD
          it.printf(68, 26, id(font_s), "VPD%.2f", id(vpd).state);
          // Horizontal divider
          it.line(0, 37, 128, 37);
          // Status bar
          it.printf(0, 40, id(font_s), "%s", id(chamber_status).state.c_str());
          // Temp in °F (Cannatrol-style)
          it.printf(68, 40, id(font_s), "%.0f\xc2\xb0""F", id(chamber_temp).state * 9.0f / 5.0f + 32.0f);
          // Frost warning (bottom row when active)
          if (id(frost_active)) {
            it.printf(0, 54, id(font_s), "! FROST GUARD ACTIVE");
          }

      # Page 2 — humidity control & setpoints
      - id: page_control
        lambda: |-
          it.printf(0,  0, id(font_m), "Control");
          it.line(0, 15, 128, 15);
          it.printf(0, 18, id(font_s), "%s", id(humidity_control_mode).state.c_str());
          it.printf(0, 30, id(font_s), "SP %.1f\xc2\xb0C / %.0f\xc2\xb0""F",
            id(temp_pid).target_temperature,
            id(temp_pid).target_temperature * 9.0f / 5.0f + 32.0f);
          it.printf(0, 42, id(font_s), "Frost floor %.0f\xc2\xb0""C", id(min_chamber_temp).state);
          it.printf(0, 54, id(font_s), "WiFi %d dBm", (int)id(wifi_signal_sensor).state);

      # Page 3 — active cure program
      - id: page_programs
        lambda: |-
          it.printf(0,  0, id(font_m), "Programs");
          it.line(0, 15, 128, 15);
          it.printf(0, 18, id(font_s), "18d: %s", id(cure_program_status).state.c_str());
          it.printf(0, 30, id(font_s), "C44: %s", id(cannatrol_program_status).state.c_str());
          if (!id(use_dew_point_control).state && !isnan(id(humidity_error).state)) {
            it.printf(0, 42, id(font_s), "RH err %+.1f%%", id(humidity_error).state);
          } else if (id(use_dew_point_control).state && !isnan(id(dew_point_error).state)) {
            it.printf(0, 42, id(font_s), "DP err %+.1f\xc2\xb0""C", id(dew_point_error).state);
          }

# ─── Status LED (WS2812 RGB, built into ESP32-C6 DevKitC-1 on GPIO8) ─────────
# Color code:
#   Cooling  → blue      Heating → red (dim)
#   Idle     → green (very dim — not distracting in the dark)
#   Frost    → white fast blink
#   Off/init → off

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO8
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 300ms
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Frost Blink"
          transition_length: 150ms
          update_interval: 350ms
          min_brightness: 0%
          max_brightness: 60%

