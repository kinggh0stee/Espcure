################################################################################
# EspCure — Thermoelectric Curing Chamber Controller
# Target board : ESP32-C6  (requires ESP-IDF framework)
# Sensor       : SHT31 or SHT45 (I²C 0x44, chamber temp/RH; no cold-plate sensor)
#                Selected via the `sht_platform` substitution below.
# Outputs      : 3× SSR-40 DD (fan rail / Peltier TECs / heater)
# Web UI       : http://espcure.local  (no Home Assistant required)
################################################################################

# ─── Build-time options ───────────────────────────────────────────────────────
# Chamber sensor select. Both the SHT31 and SHT45 use I²C address 0x44 and the
# same wiring — only the ESPHome platform and the on-chip heater API differ.
#
# To swap sensors, set the three substitutions below to match, then reflash.
# CI compiles BOTH variants on every PR, so a mismatch fails the build.
#
#   SHT31 (sht3xd) — has a real runtime heater toggle:
#     sht_platform:   sht3xd
#     sht_heater_on:  "id(sht45).set_heater_enabled(true);"
#     sht_heater_off: "id(sht45).set_heater_enabled(false);"
#
#   SHT45 (sht4x) — NO on-demand heater API exists (heater is config-time only),
#   so the Clear Sensor Condensation button just takes a fresh reading (no pulse):
#     sht_platform:   sht4x
#     sht_heater_on:  ";"
#     sht_heater_off: ";"
substitutions:
  sht_platform: sht3xd        # SHT31 (temporary). Change to sht4x when the SHT45 arrives.
  # Heater statements for the Clear Sensor Condensation button (see block above).
  sht_heater_on:  "id(sht45).set_heater_enabled(true);"
  sht_heater_off: "id(sht45).set_heater_enabled(false);"

esphome:
  name: espcure
  friendly_name: EspCure
  comment: "Thermoelectric curing chamber — DIY Cannatrol"
  on_boot:
    # Heat-only PID — put the climate in HEAT mode so the heater chases temperature
    # from boot. The Peltier is driven separately by the dew-point/VPD loop.
    - priority: -100
      then:
        - climate.control:
            id: temp_pid
            mode: HEAT
    # Apply restored PID number entity values so tuned gains survive reboots.
    # Must run after component init (lower priority = runs later).
    - priority: -200
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return id(pid_kd).state;

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# ─── Core services ────────────────────────────────────────────────────────────

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "EspCure-Setup"
    password: !secret ap_password

captive_portal:

# WiFi provisioning — required for Made for ESPHome compliance
# authorizer: page_button — hold the BOOT button (GPIO9) to authorize BLE provisioning
esp32_improv:
  authorizer: page_button

improv_serial:

# Device-hosted web UI — browse to http://espcure.local
# version: 3 provides a full React dashboard with dark mode toggle.
# local: true serves assets from flash (works without internet).
web_server:
  port: 80
  version: 3
  local: true
  # Group order = top-to-bottom on the device web page. Essentials first; the
  # set-once knobs cluster in "Setup & Tuning" and debug data in "Diagnostics"
  # at the bottom (both collapsible). NOTE: entity_category does NOT hide
  # entities from this page (it only affects Home Assistant); grouping + order
  # is the lever here. Truly unused entities use `internal: true` instead.
  sorting_groups:
    - id: grp_climate
      name: "Climate & Temperature"
      sorting_weight: 10
    - id: grp_humidity
      name: "Humidity & Dew Point"
      sorting_weight: 20
    - id: grp_programs
      name: "Cure Programs"
      sorting_weight: 30
    - id: grp_status
      name: "Status & Indicators"
      sorting_weight: 40
    - id: grp_setup
      name: "Setup & Tuning"
      sorting_weight: 80
    - id: grp_diag
      name: "Diagnostics"
      sorting_weight: 90

# ─── I²C (SHT31/SHT45 chamber sensor) ─────────────────────────────────────────
# SDA → GPIO21   SCL → GPIO22

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

# ─── Globals ──────────────────────────────────────────────────────────────────

globals:
  # Software frost guard — set when chamber_temp drops below min_chamber_temp floor
  - id: frost_active
    type: bool
    restore_value: false
    initial_value: "false"

  # Peltier cooling demand — tracks the dew-point/VPD bang-bang loop state.
  # The Peltier is a float (ledc) output that can't be read back in lambda, so
  # this global is the single source of truth for "cold plate is condensing".
  - id: peltier_cooling
    type: bool
    restore_value: false
    initial_value: "false"

  # Cannatrol 4+4 program phase: 0 = dry (days 1–4), 1 = cure (days 5–8)
  - id: cannatrol_phase
    type: int
    restore_value: true
    initial_value: "0"

  # Last status-LED state applied by the 2 s loop, so the LED is updated only
  # on a genuine state change (edge-triggered). Re-asserting every cycle
  # restarts the Frost Blink pulse effect and stomps manual control.
  # -2 = disabled (Status LED Enable off), -1 = uninitialised,
  #  0 = idle, 1 = cooling, 2 = heating, 3 = frost.
  - id: led_state
    type: int
    restore_value: false
    initial_value: "-1"

# ─── Sensors ──────────────────────────────────────────────────────────────────

sensor:
  # ── Chamber air (SHT31 or SHT45) ─────────────────────────────────────────────
  # Platform set by the `sht_platform` substitution at the top of this file.
  # `precision`/`heater_max_duty` (sht4x) and `repeatability`/`heater_enabled`
  # (sht3xd) are omitted: both platforms default to highest-quality measurement
  # and on-chip heater OFF, which is exactly what we want. The "Clear Sensor
  # Condensation" button pulses the heater on-demand (heater API differs — see
  # that button below). id stays `sht45` so downstream id() refs are untouched.
  - platform: ${sht_platform}
    id: sht45
    address: 0x44
    update_interval: 30s
    temperature:
      id: chamber_temp
      name: "Chamber Temperature"
      device_class: temperature
      state_class: measurement
      icon: "mdi:thermometer"
      filters:
        - offset: 0.0        # calibrate after install (see docs/calibration.md)
      web_server:
        sorting_group_id: grp_climate
        sorting_weight: 1
    humidity:
      id: chamber_rh
      name: "Chamber Humidity"
      device_class: humidity
      state_class: measurement
      icon: "mdi:water-percent"
      filters:
        - offset: 0.0
      web_server:
        sorting_group_id: grp_humidity
        sorting_weight: 1

  # ── Derived humidity metrics ─────────────────────────────────────────────────

  # Dew point via Magnus formula — Cannatrol controls this, not raw RH
  - platform: template
    id: dew_point
    name: "Dew Point"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer-water"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh) || rh <= 0.0f) return NAN;
      float g = log(rh / 100.0f) + (17.625f * t) / (243.04f + t);
      return 243.04f * g / (17.625f - g);
    update_interval: 30s
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 2

  # Vapor Pressure Deficit — still computed (the OLED shows it), but VPD mode is
  # hidden from the UI, so this is internal: true (not on the web page or in HA).
  - platform: template
    id: vpd
    name: "Vapor Pressure Deficit"
    internal: true
    unit_of_measurement: "kPa"
    state_class: measurement
    icon: "mdi:waves"
    lambda: |-
      float t  = id(chamber_temp).state;
      float rh = id(chamber_rh).state;
      if (isnan(t) || isnan(rh)) return NAN;
      float svp = 0.6108f * exp(17.27f * t / (t + 237.3f));
      return svp * (1.0f - rh / 100.0f);
    update_interval: 30s

  # Dew-point error vs setpoint (positive = too humid; NaN when in VPD mode)
  - platform: template
    id: dew_point_error
    name: "Dew Point Error"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer-alert"
    entity_category: diagnostic
    lambda: |-
      if (!id(use_dew_point_control).state) return NAN;
      if (id(use_vpd_control).state) return NAN;
      if (isnan(id(dew_point).state)) return NAN;
      return id(dew_point).state - id(dew_point_setpoint).state;
    update_interval: 30s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 5

  # Peltier duty as a readable entity (bang-bang: 0 or 100 %). Reads the
  # peltier_cooling global since a float output can't be read back in lambda.
  # It's a derived diagnostic of the humidity loop, not a hardware control.
  - platform: template
    id: peltier_output_pct
    name: "Peltier (Dehumidify) Duty"
    unit_of_measurement: "%"
    state_class: measurement
    icon: "mdi:snowflake"
    entity_category: diagnostic
    lambda: |-
      return id(peltier_cooling) ? 100.0f : 0.0f;
    update_interval: 5s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 2

  # VPD error vs setpoint — internal: true (VPD mode is hidden from the UI)
  - platform: template
    id: vpd_error
    name: "VPD Error"
    internal: true
    unit_of_measurement: "kPa"
    state_class: measurement
    icon: "mdi:waves-arrow-up"
    lambda: |-
      if (!id(use_vpd_control).state) return NAN;
      if (isnan(id(vpd).state)) return NAN;
      return id(vpd).state - id(vpd_setpoint).state;
    update_interval: 30s

  # ── PID diagnostics (heat-only — Peltier is not driven by the PID) ───────────
  - platform: pid
    climate_id: temp_pid
    name: "PID Heat Output"
    type: HEAT
    entity_category: diagnostic
    icon: "mdi:fire"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 3
  - platform: pid
    climate_id: temp_pid
    name: "PID Integral"
    type: INTEGRAL
    entity_category: diagnostic
    icon: "mdi:sigma"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 4

  # ── System diagnostics ───────────────────────────────────────────────────────
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 7
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "WiFi Signal"
    device_class: signal_strength
    state_class: measurement
    entity_category: diagnostic
    update_interval: 60s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 8

# ─── Outputs ──────────────────────────────────────────────────────────────────

output:
  # TEC cooling — both Peltiers in parallel through one SSR-40 DD
  # GPIO18 → SSR-40 DD → TEC1 (+) || TEC2 (+) → 12 V PSU (−)
  - platform: ledc
    id: peltier_output
    pin:
      number: GPIO18
      inverted: false
    frequency: 15Hz

  # 12 V 50 W PTC heater with integrated 12 V fan
  # GPIO19 → SSR-40 DD → heater+fan 12 V supply
  # LEDC 15 Hz / 10-bit: finer PID resolution; SSR-40 DD handles this frequency cleanly
  - platform: ledc
    id: heater_output
    pin:
      number: GPIO19
      inverted: false
    frequency: 15Hz


# ─── Switches ─────────────────────────────────────────────────────────────────

switch:
  # Fan rail — all 3 fans together (2× TEC hot-side + heater fan)
  # GPIO5 → SSR-40 DD → fan rail 12 V (controlled by PID state — on when active, off when idle)
  # Auto-driven by the 2 s interval (on when Peltier cooling or heater heating);
  # diagnostic category so users don't toggle it expecting it to stick.
  - platform: gpio
    id: fan_relay
    name: "Chamber Fans"
    pin: GPIO5
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:fan"
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 10

  # Status LED enable — gates the 2 s status-LED loop. When ON (default), the
  # WS2812 automatically reflects the cooling/heating/idle/frost state. When
  # OFF, the loop turns the LED off and stops driving it (e.g. to kill the
  # glow in a dark room). Fan control is unaffected — it always runs.
  - platform: template
    id: status_led_enable
    name: "Status LED Enable"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: "mdi:led-on"
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 4

  # 10-day dew-point dry program (proven recipe — replaces the 24 h hang):
  #   Day 1   : ramp dew point 15.6 °C → 13.9 °C → 12.2 °C
  #   Days 2–5: hold 12.2 °C dew point
  #   Days 6–9: hold 11.1 °C dew point
  #   Day 10  : complete, auto-off
  - platform: template
    id: dry10_program_active
    name: "10-Day Dry Program"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:sprout"
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 3
    on_turn_on:
      - switch.turn_off: cannatrol_program_active  # only one program at a time
      - number.set:
          id: dry10_day
          value: 0
      - number.set:
          id: dew_point_setpoint
          value: 15.6       # start of the 2-day ramp
      - climate.control:
          id: temp_pid
          target_temperature: 15.6    # 15.6 °C
      - switch.turn_on: use_dew_point_control

  # Cannatrol 4+4 program: 4 days dry (12.2 °C DP) then 4 days cure (11.1 °C DP)
  - platform: template
    id: cannatrol_program_active
    name: "Cannatrol 4+4 Program"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:cannabis"
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 5
    on_turn_on:
      - switch.turn_off: dry10_program_active      # only one program at a time
      - number.set:
          id: cannatrol_day
          value: 0
      - lambda: id(cannatrol_phase) = 0;
      - number.set:
          id: dew_point_setpoint
          value: 12.2       # Cannatrol dry profile
      - climate.control:
          id: temp_pid
          target_temperature: 20.0    # 20 °C
      - switch.turn_on: use_dew_point_control

  # Humidity control mode — Dew Point (default).
  # The active mode drives the Peltier (cold-plate condensation), not a relay.
  # Mutually exclusive with VPD mode.
  - platform: template
    id: use_dew_point_control
    name: "Dew Point Control Mode"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: "mdi:thermometer-water"
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 4
    on_turn_on:
      - switch.turn_off: use_vpd_control

  # VPD control mode — internal: true. VPD is hidden from the UI (the build runs
  # Dew Point mode), so this switch can't be enabled; the VPD branch in the 30 s
  # loop is dead-but-harmless. Kept (not deleted) so re-enabling VPD is a
  # one-line revert. Still toggled off by use_dew_point_control's on_turn_on.
  - platform: template
    id: use_vpd_control
    name: "VPD Control Mode"
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    icon: "mdi:waves"
    on_turn_on:
      - switch.turn_off: use_dew_point_control

# ─── Numbers (user-adjustable setpoints) ──────────────────────────────────────

number:
  # ── Dew-point mode setpoints ─────────────────────────────────────────────────
  # Cannatrol defaults: 12.2 °C for dry, 11.1 °C for cure
  - platform: template
    id: dew_point_setpoint
    name: "Dew Point Setpoint"
    min_value: 4.0
    max_value: 18.0
    step: 0.1
    initial_value: 11.1    # Cannatrol cure default
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:target"
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 3

  - platform: template
    id: dew_point_hysteresis
    name: "Dew Point Hysteresis"
    min_value: 0.1
    max_value: 2.0
    step: 0.1
    initial_value: 0.5
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:tune"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 3

  # ── Frost floor ──────────────────────────────────────────────────────────────
  # PID suspends if chamber air drops below this — software-only, no cold-plate sensor
  - platform: template
    id: min_chamber_temp
    name: "Min Chamber Temperature (Frost Floor)"
    min_value: 1.0
    max_value: 10.0
    step: 0.5
    initial_value: 4.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:snowflake-alert"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 1

  # ── High-temperature safety ceiling ──────────────────────────────────────────
  # Heat-only PID can't cool, so this forces the Peltier ON above this limit
  # (independent of humidity mode). Default 27 °C — a safety net, well
  # above the normal 17–19 °C curing range.
  - platform: template
    id: max_chamber_temp
    name: "Max Chamber Temperature (Safety Ceiling)"
    min_value: 22.0
    max_value: 32.0
    step: 0.5
    initial_value: 27.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    icon: "mdi:fire-alert"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 2

  # ── Cure program counters ────────────────────────────────────────────────────
  - platform: template
    id: dry10_day
    name: "10-Day Program Day"
    min_value: 0
    max_value: 10
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    icon: "mdi:calendar-today"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 9

  - platform: template
    id: cannatrol_day
    name: "Cannatrol Program Day"
    min_value: 0
    max_value: 9
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    icon: "mdi:calendar-today"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 10

  # ── Live PID tuning ──────────────────────────────────────────────────────────
  # Changing any coefficient immediately applies via set_control_parameters.
  # Tune from http://espcure.local or Home Assistant without reflashing.
  - platform: template
    id: pid_kp
    name: "PID Kp"
    min_value: 0.01
    max_value: 2.0
    step: 0.01
    initial_value: 0.35
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-p-circle"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 4
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return x;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return id(pid_kd).state;

  - platform: template
    id: pid_ki
    name: "PID Ki"
    min_value: 0.0
    max_value: 0.1
    step: 0.001
    initial_value: 0.005
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-i-circle"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 5
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return x;
            kd: !lambda return id(pid_kd).state;

  - platform: template
    id: pid_kd
    name: "PID Kd"
    min_value: 0.0
    max_value: 5.0
    step: 0.05
    initial_value: 1.2
    restore_value: true
    optimistic: true
    icon: "mdi:alpha-d-circle"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 6
    on_value:
      then:
        - climate.pid.set_control_parameters:
            id: temp_pid
            kp: !lambda return id(pid_kp).state;
            ki: !lambda return id(pid_ki).state;
            kd: !lambda return x;

  # ── VPD mode setpoints — internal: true (VPD mode is hidden from the UI) ──────
  - platform: template
    id: vpd_setpoint
    name: "VPD Setpoint"
    internal: true
    min_value: 0.1
    max_value: 2.0
    step: 0.05
    initial_value: 0.8
    restore_value: true
    optimistic: true
    unit_of_measurement: "kPa"
    icon: "mdi:target"

  - platform: template
    id: vpd_hysteresis
    name: "VPD Hysteresis"
    internal: true
    min_value: 0.02
    max_value: 0.3
    step: 0.02
    initial_value: 0.1
    restore_value: true
    optimistic: true
    unit_of_measurement: "kPa"
    icon: "mdi:tune"

# ─── Climate (Temperature PID) ────────────────────────────────────────────────

climate:
  # Heat-only PID: the heater chases temperature. The Peltier is NOT a PID output
  # — it is driven by the dew-point/VPD bang-bang loop (cold-plate condensation).
  - platform: pid
    id: temp_pid
    name: "Temperature Control"
    sensor: chamber_temp
    icon: "mdi:thermometer"
    default_target_temperature: 15.6    # 15.6 °C — realistic floor for Peltier strength
    heat_output: heater_output
    web_server:
      sorting_group_id: grp_climate
      sorting_weight: 2
    control_parameters:
      # Starting values — run PID Autotune after install to refine for your fridge
      # Update pid_kp/ki/kd number entities after tuning (docs/pid-tuning.md)
      kp: 0.35
      ki: 0.005
      kd: 1.2
      max_integral: 1.0
      output_averaging_samples: 5
      derivative_averaging_samples: 5
    deadband_parameters:
      threshold_high: 0.5              # ±0.5 °C deadband
      threshold_low: -0.5
      kp_multiplier: 0.1
      ki_multiplier: 0.05
      kd_multiplier: 0.0

# ─── Time (Home Assistant — drives daily cure program steps) ──────────────────

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - cron: "0 0 0 * * *"    # midnight daily (ESPHome cron: sec min hour dom mon dow)
        then:
          # 10-day dry program: dew-point ramp 15.6→12.2 °C over 2 days, then 12.2, then 11.1
          - if:
              condition:
                switch.is_on: dry10_program_active
              then:
                - lambda: |-
                    int day = (int)id(dry10_day).state + 1;
                    auto dc = id(dry10_day).make_call();
                    dc.set_value((float)day);
                    dc.perform();
                    float dp;
                    if (day == 1)                 dp = 13.9f;   // 13.9 °C — mid-ramp
                    else if (day >= 2 && day <= 5) dp = 12.2f;  // 12.2 °C — dry hold
                    else if (day >= 6 && day <= 9) dp = 11.1f;  // 11.1 °C — cure hold
                    else { id(dry10_program_active).turn_off(); return; }
                    auto sp = id(dew_point_setpoint).make_call();
                    sp.set_value(dp);
                    sp.perform();

          # Cannatrol 4+4: days 1-4 dry (12.2 °C DP), days 5-8 cure (11.1 °C DP)
          - if:
              condition:
                switch.is_on: cannatrol_program_active
              then:
                - lambda: |-
                    int day = (int)id(cannatrol_day).state + 1;
                    auto dc = id(cannatrol_day).make_call();
                    dc.set_value((float)day);
                    dc.perform();
                    if (day <= 4) {
                      id(cannatrol_phase) = 0;
                      auto sp = id(dew_point_setpoint).make_call();
                      sp.set_value(12.2f);
                      sp.perform();
                    } else if (day <= 8) {
                      id(cannatrol_phase) = 1;
                      auto sp = id(dew_point_setpoint).make_call();
                      sp.set_value(11.1f);
                      sp.perform();
                    } else {
                      id(cannatrol_program_active).turn_off();
                    }

# ─── Interval automations ─────────────────────────────────────────────────────

interval:
  # Dew-point / VPD bang-bang loop (30 s) — drives the PELTIER (cold-plate
  # condensation). Priority: frost guard → high-temp ceiling → VPD mode →
  # Dew Point mode → off.
  # Cooling the plate below the dew point condenses moisture out of the air.
  - interval: 30s
    then:
      - lambda: |-
          // Frost guard overrides everything — never cool below the floor.
          if (id(frost_active)) {
            id(peltier_cooling) = false;
            id(peltier_output).set_level(0.0f);
            return;
          }
          // High-temperature safety ceiling — force cooling regardless of humidity
          // demand so a heat-only PID can't let the chamber overheat. Default 27 °C
          // (27 °C) is well above the 17–19 °C operating range, so this never fires
          // in normal use. The hot-side fan is commanded ON in the same pass.
          if (!isnan(id(chamber_temp).state) &&
              id(chamber_temp).state > id(max_chamber_temp).state) {
            id(peltier_cooling) = true;
            id(fan_relay).turn_on();
            id(peltier_output).set_level(1.0f);
            return;
          }
          bool on = id(peltier_cooling);
          // NOTE: whenever the Peltier is commanded ON, the hot-side fan is turned ON
          // in the same lambda so the TEC never runs at full duty without airflow.
          if (id(use_vpd_control).state) {
            if (isnan(id(vpd).state)) return;
            float v    = id(vpd).state;
            float sp   = id(vpd_setpoint).state;
            float hyst = id(vpd_hysteresis).state / 2.0f;
            // Low VPD = too humid → cool the plate to condense moisture
            if (!on && v < sp - hyst) { id(peltier_cooling) = true;  id(fan_relay).turn_on(); id(peltier_output).set_level(1.0f); }
            else if (on && v > sp + hyst) { id(peltier_cooling) = false; id(peltier_output).set_level(0.0f); }
          } else if (id(use_dew_point_control).state) {
            if (isnan(id(dew_point).state)) return;
            float dp   = id(dew_point).state;
            float sp   = id(dew_point_setpoint).state;
            float hyst = id(dew_point_hysteresis).state / 2.0f;
            if (!on && dp > sp + hyst) { id(peltier_cooling) = true;  id(fan_relay).turn_on(); id(peltier_output).set_level(1.0f); }
            else if (on && dp < sp - hyst) { id(peltier_cooling) = false; id(peltier_output).set_level(0.0f); }
          } else {
            // No humidity mode active — Peltier idle.
            if (on) { id(peltier_cooling) = false; id(peltier_output).set_level(0.0f); }
          }

  # Software frost guard (60 s)
  # No cold-plate sensor — uses chamber air as proxy.
  # Frost forces the PELTIER (cooling path) OFF below min_chamber_temp and lets it
  # resume at floor + 2 °C. The heat-only PID is left running — heating helps
  # recover from a frost event.
  - interval: 60s
    then:
      - lambda: |-
          if (isnan(id(chamber_temp).state)) return;
          float t     = id(chamber_temp).state;
          float floor = id(min_chamber_temp).state;
          if (!id(frost_active) && t < floor) {
            id(frost_active) = true;
            ESP_LOGW("espcure", "Frost floor reached (%.1f°C <= %.1f°C) — Peltier suspended", t, floor);
            id(peltier_cooling) = false;
            id(peltier_output).set_level(0.0f);
          } else if (id(frost_active) && t > floor + 2.0f) {
            id(frost_active) = false;
            ESP_LOGI("espcure", "Chamber recovered (%.1f°C) — Peltier may resume", t);
            // The 30 s humidity loop re-engages the Peltier on its next pass.
          }

  # Status LED update + fan control (2 s)
  # Fan: on when the Peltier is cooling OR the heater is heating; off otherwise.
  # LED (when enabled via Status LED Enable):
  #   Blue = cooling (Peltier) · Red = heating · Green (dim) = idle · White blink = frost
  - interval: 2s
    then:
      - lambda: |-
          bool cooling = id(peltier_cooling);
          bool heating = id(temp_pid).action == esphome::climate::CLIMATE_ACTION_HEATING;
          // Fan runs unconditionally every cycle — on when cooling or heating.
          if (cooling || heating) {
            id(fan_relay).turn_on();
          } else {
            id(fan_relay).turn_off();
          }

          // Status LED disabled — turn it off once, then leave it alone.
          if (!id(status_led_enable).state) {
            if (id(led_state) != -2) {
              id(led_state) = -2;
              auto off = id(status_led).make_call();
              off.set_state(false);
              off.perform();
            }
            return;
          }

          // Resolve the desired LED state, then bail out unless it changed.
          // Edge-triggering keeps the Frost Blink pulse running smoothly (a
          // fresh set_effect() each cycle would restart it) and stops the loop
          // from stomping the light's state every 2 s.
          int state;
          if (id(frost_active))   state = 3;
          else if (cooling)       state = 1;
          else if (heating)       state = 2;
          else                    state = 0;
          if (state == id(led_state)) return;
          id(led_state) = state;

          auto call = id(status_led).make_call();
          if (state == 3) {
            // White fast blink — frost guard active.
            // No transition: transitions are incompatible with effects.
            call.set_state(true);
            call.set_rgb(1.0f, 1.0f, 1.0f);
            call.set_brightness(0.5f);
            call.set_effect("Frost Blink");
          } else {
            call.set_transition_length(300);
            call.set_effect("None");
            if (state == 1) {
              call.set_state(true);
              call.set_rgb(0.0f, 0.3f, 1.0f);   // blue — Peltier condensing
              call.set_brightness(0.7f);
            } else if (state == 2) {
              call.set_state(true);
              call.set_rgb(1.0f, 0.15f, 0.0f);  // red — heater on
              call.set_brightness(0.5f);
            } else {
              call.set_state(true);
              call.set_rgb(0.0f, 1.0f, 0.0f);   // green very dim — idle
              call.set_brightness(0.04f);
            }
          }
          call.perform();

# ─── Buttons ──────────────────────────────────────────────────────────────────

button:
  # PID autotune — hold chamber at setpoint for a few hours before running
  - platform: template
    name: "PID Autotune"
    icon: "mdi:auto-fix"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 7
    on_press:
      - climate.pid.autotune:
          id: temp_pid
          noiseband: 0.25
          positive_output: 1.0
          negative_output: 0.0   # heat-only: no cool_output; off is the correct low state

  - platform: restart
    name: "Restart Controller"
    icon: "mdi:restart"
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 11

  # Pulse the on-chip heater briefly to clear condensation from the sensor face,
  # then take a clean reading. The heater statements come from the `sht_heater_on`
  # / `sht_heater_off` substitutions (top of file) so the same button compiles for
  # either sensor. On the SHT31 they toggle the runtime heater; on the SHT45 they
  # are no-ops (the sht4x platform has no on-demand heater API), so the button just
  # refreshes the reading. CI compiles both variants to keep them in sync.
  - platform: template
    name: "Clear Sensor Condensation"
    icon: "mdi:heat-wave"
    entity_category: config
    web_server:
      sorting_group_id: grp_setup
      sorting_weight: 8
    on_press:
      - lambda: |-
          ESP_LOGI("espcure", "Clear Sensor Condensation: applying sensor heater (if supported)");
          ${sht_heater_on}
      - component.update: sht45
      - delay: 1000ms
      - lambda: |-
          ${sht_heater_off}
          ESP_LOGI("espcure", "Clear Sensor Condensation: taking a fresh reading");
      - component.update: sht45

  # ── Cannatrol one-tap presets ────────────────────────────────────────────────
  # Apply full profile: temp + dew point setpoints + enable dew-point mode.

  - platform: template
    name: "Apply Dry Profile"
    icon: "mdi:weather-sunny"
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 1
    on_press:
      then:
        - number.set:
            id: dew_point_setpoint
            value: 12.2        # Cannatrol dry
        - climate.control:
            id: temp_pid
            target_temperature: 20.0   # 20 °C
        - switch.turn_on: use_dew_point_control

  - platform: template
    name: "Apply Cure Profile"
    icon: "mdi:leaf"
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 2
    on_press:
      then:
        - number.set:
            id: dew_point_setpoint
            value: 11.1        # Cannatrol cure
        - climate.control:
            id: temp_pid
            target_temperature: 20.0   # 20 °C
        - switch.turn_on: use_dew_point_control

# ─── Binary sensors ───────────────────────────────────────────────────────────

binary_sensor:
  - platform: status
    name: "Controller Online"
    icon: "mdi:wifi-check"
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 9

  # Live safety state — promoted near the top of the page (Status & Indicators)
  - platform: template
    name: "Frost Floor Active"
    device_class: problem
    lambda: return id(frost_active);
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 1

  # BOOT button (GPIO9, built into ESP32-C6 DevKitC-1) — cycles display pages.
  # INPUT_PULLUP + inverted: no extra hardware needed. internal: true keeps it
  # off the web page / HA; the on_click automation and the esp32_improv
  # authorizer still work (both reference the id, not the API exposure).
  - platform: gpio
    id: page_button
    name: "Display Page Button"
    internal: true
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - display.page.show_next: oled
        - component.update: oled

# ─── Text sensors ─────────────────────────────────────────────────────────────

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 12

  # Human-readable chamber operating state (shown on web UI dashboard)
  - platform: template
    id: chamber_status
    name: "Chamber Status"
    icon: "mdi:information-outline"
    lambda: |-
      if (id(frost_active)) return std::string("Frost Guard");
      if (id(peltier_cooling)) return std::string("Cooling");
      if (id(temp_pid).action == esphome::climate::CLIMATE_ACTION_HEATING) return std::string("Heating");
      return std::string("Idle");
    update_interval: 30s
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 2

  # Active humidity control mode with live setpoint readout — internal: true.
  # Still read by the OLED page-2 lambda; hidden from the web page / HA since the
  # mode toggles are no longer user-facing (Dew Point is the only active mode).
  - platform: template
    id: humidity_control_mode
    name: "Humidity Control Mode"
    internal: true
    icon: "mdi:water-check"
    lambda: |-
      char buf[48];
      if (id(use_vpd_control).state) {
        snprintf(buf, sizeof(buf), "VPD Mode %.2f kPa SP", id(vpd_setpoint).state);
      } else if (id(use_dew_point_control).state) {
        snprintf(buf, sizeof(buf), "Dew Point %.1f\xc2\xb0""C SP", id(dew_point_setpoint).state);
      } else {
        snprintf(buf, sizeof(buf), "Humidity control off");
      }
      return std::string(buf);
    update_interval: 30s
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 7

  # 10-day dry program progress
  - platform: template
    id: dry10_program_status
    name: "10-Day Program Status"
    icon: "mdi:sprout"
    lambda: |-
      if (!id(dry10_program_active).state) return std::string("Inactive");
      char buf[56];
      int day = (int)id(dry10_day).state;
      const char *phase;
      if (day <= 1)      phase = "Ramp\xe2\x86\x92""12.2\xc2\xb0""C";
      else if (day <= 5) phase = "Dry 12.2\xc2\xb0""C";
      else               phase = "Cure 11.1\xc2\xb0""C";
      snprintf(buf, sizeof(buf), "Day %d/10 \xe2\x80\x94 %s", day + 1, phase);
      return std::string(buf);
    update_interval: 30s
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 4

  # Cannatrol 4+4 program progress
  - platform: template
    id: cannatrol_program_status
    name: "Cannatrol Program Status"
    icon: "mdi:cannabis"
    lambda: |-
      if (!id(cannatrol_program_active).state) return std::string("Inactive");
      char buf[56];
      int day = (int)id(cannatrol_day).state;
      if (id(cannatrol_phase) == 0) {
        // days 0-3 display as Day 1/4 – Day 4/4; day=4 is transitional (still dry)
        int d = (day + 1 <= 4) ? day + 1 : 4;
        snprintf(buf, sizeof(buf), "Dry Phase \xe2\x80\x94 Day %d/4 (12.2\xc2\xb0""C DP)", d);
      } else {
        // cure days start at cannatrol_day=5; day-4 gives 1-4
        snprintf(buf, sizeof(buf), "Cure Phase \xe2\x80\x94 Day %d/4 (11.1\xc2\xb0""C DP)", day - 4);
      }
      return std::string(buf);
    update_interval: 30s
    web_server:
      sorting_group_id: grp_programs
      sorting_weight: 6

# ─── Display (SSD1306 0.96" OLED — optional) ─────────────────────────────────
# Requires an SSD1306 or SH1106 I²C OLED wired to the existing I²C bus:
#   OLED VCC → 3.3V   OLED GND → GND
#   OLED SDA → GPIO21  OLED SCL → GPIO22  (same pins as SHT45 — no conflict)
#
# Fonts are downloaded from Google Fonts at compile time (internet required).
# See docs/display-plan.md for ST7789 TFT wiring and alternative font options.

font:
  - file: "gfonts://Roboto"
    id: font_s
    size: 9
  - file: "gfonts://Roboto"
    id: font_m
    size: 13
  - file: "gfonts://Roboto"
    id: font_l
    size: 20

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    rotation: 0°
    update_interval: 5s
    pages:

      # Page 1 — primary readings
      - id: page_main
        lambda: |-
          if (isnan(id(chamber_temp).state)) {
            it.printf(0, 24, id(font_m), "Sensor init...");
            return;
          }
          // Temp (large, left half)
          it.printf(0,  0, id(font_l), "%.1f\xc2\xb0""C", id(chamber_temp).state);
          // RH (large, right half)
          it.printf(68, 0, id(font_l), "%.0f%%", id(chamber_rh).state);
          // Dew point
          it.printf(0, 26, id(font_s), "DP %.1f\xc2\xb0""C", id(dew_point).state);
          // VPD
          it.printf(68, 26, id(font_s), "VPD%.2f", id(vpd).state);
          // Horizontal divider
          it.line(0, 37, 128, 37);
          // Status bar
          it.printf(0, 40, id(font_s), "%s", id(chamber_status).state.c_str());
          // Temp target setpoint
          it.printf(68, 40, id(font_s), "SP %.0f\xc2\xb0""C", id(temp_pid).target_temperature);
          // Frost warning (bottom row when active)
          if (id(frost_active)) {
            it.printf(0, 54, id(font_s), "! FROST GUARD ACTIVE");
          }

      # Page 2 — humidity control & setpoints
      - id: page_control
        lambda: |-
          it.printf(0,  0, id(font_m), "Control");
          it.line(0, 15, 128, 15);
          it.printf(0, 18, id(font_s), "%s", id(humidity_control_mode).state.c_str());
          it.printf(0, 30, id(font_s), "Temp SP %.1f\xc2\xb0""C", id(temp_pid).target_temperature);
          it.printf(0, 42, id(font_s), "Frost floor %.0f\xc2\xb0""C", id(min_chamber_temp).state);
          it.printf(0, 54, id(font_s), "WiFi %d dBm", (int)id(wifi_signal_sensor).state);

      # Page 3 — active cure program
      - id: page_programs
        lambda: |-
          it.printf(0,  0, id(font_m), "Programs");
          it.line(0, 15, 128, 15);
          it.printf(0, 18, id(font_s), "10d: %s", id(dry10_program_status).state.c_str());
          it.printf(0, 30, id(font_s), "C44: %s", id(cannatrol_program_status).state.c_str());
          if (!isnan(id(dew_point_error).state)) {
            it.printf(0, 42, id(font_s), "DP err %+.1f\xc2\xb0""C", id(dew_point_error).state);
          }

# ─── Status LED (WS2812 RGB, built into ESP32-C6 DevKitC-1 on GPIO8) ─────────
# Color code:
#   Cooling  → blue      Heating → red (dim)
#   Idle     → green (very dim — not distracting in the dark)
#   Frost    → white fast blink
#   Off/init → off

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO8
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 300ms
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: grp_status
      sorting_weight: 3
    effects:
      - pulse:
          name: "Frost Blink"
          transition_length: 150ms
          update_interval: 350ms
          min_brightness: 0%
          max_brightness: 60%

# ─── Optional hardware addition (uncomment to enable) ──────────────────────────

# ── Cold-plate DS18B20 (direct frost detection) ───────────────────────────────
# One-wire DS18B20 temperature sensor on the Peltier cold plate.
# This allows direct frost detection instead of the software-only air-temp proxy.
# Wire DATA → GPIO10, with 4.7 kΩ pull-up to 3.3 V.
#
# dallas_temp:
#   pin: GPIO10
#   update_interval: 10s
#
# sensor:
#   - platform: dallas_temp
#     id: cold_plate_temp
#     name: "Cold Plate Temperature"
#     device_class: temperature
#     state_class: measurement
#     accuracy_decimals: 1
