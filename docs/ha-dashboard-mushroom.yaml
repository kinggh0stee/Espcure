# EspCure — Home Assistant Dashboard (Mushroom / HACS edition)
#
# A polished dashboard built on popular HACS frontend cards. Install these
# from HACS → Frontend first:
#   - Mushroom         (custom:mushroom-*)
#   - mini-graph-card  (custom:mini-graph-card)
#   - ApexCharts card  (custom:apexcharts-card)
#   - Plotly Graph Card (custom:plotly-graph) — github.com/dbuezas/lovelace-plotly-graph-card
#   - card-mod         (styling: rounded corners, conditional colors)
#
# Prefer zero dependencies? Use ha-dashboard.yaml instead — it needs no HACS.
#
# Import: Settings → Dashboards → Add Dashboard → New dashboard from scratch,
# then open it → ✏️ Edit → ⋮ (top-right) → Raw configuration editor,
# delete everything, paste this whole file, Save.
#
# Entity prefix: espcure  (change throughout if you renamed the device in ESPHome)

title: EspCure
views:
  # ══════════════════════════════════════════════════════════════════════════
  # OVERVIEW
  # ══════════════════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:cannabis
    type: sections
    max_columns: 2
    sections:
      # ── Chamber snapshot ────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Chamber
            heading_style: title
            icon: mdi:fridge-outline

          # Status chip row
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                entity: sensor.espcure_chamber_status
                content: "{{ states('sensor.espcure_chamber_status') }}"
                icon: >-
                  {% set s = states('sensor.espcure_chamber_status') %}{% if s ==
                  'Cooling' %}mdi:snowflake{% elif s == 'Heating'
                  %}mdi:fire{% elif s == 'Frost Guard'
                  %}mdi:snowflake-alert{% else %}mdi:power-standby{% endif %}
                icon_color: >-
                  {% set s = states('sensor.espcure_chamber_status') %}{% if s ==
                  'Cooling' %}blue{% elif s == 'Heating' %}red{% elif s ==
                  'Frost Guard' %}cyan{% else %}grey{% endif %}
              - type: template
                entity: binary_sensor.espcure_controller_online
                icon: >-
                  {% if is_state('binary_sensor.espcure_controller_online',
                  'on') %}mdi:wifi{% else %}mdi:wifi-off{% endif %}
                content: "{{ states('sensor.espcure_wifi_signal') }} dBm"
                icon_color: >-
                  {% if is_state('binary_sensor.espcure_controller_online',
                  'on') %}green{% else %}red{% endif %}
              - type: template
                entity: sensor.espcure_firmware_version
                icon: mdi:tag-outline
                content: "v{{ states('sensor.espcure_firmware_version') }}"
                icon_color: grey

          # Big metric tiles: Temp · RH · Dew Point
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.espcure_chamber_temperature') | float(0) | round(1) }} °C"
                secondary: Temperature
                icon: mdi:thermometer
                icon_color: >-
                  {% set t = states('sensor.espcure_chamber_temperature') |
                  float(0) %}{% if t >= 26 %}red{% elif t >= 22 %}orange{% else
                  %}green{% endif %}
                layout: vertical
                card_mod:
                  style: |
                    ha-card { border-radius: 16px; }
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.espcure_chamber_humidity') | float(0) | round(0) }} %"
                secondary: Humidity
                icon: mdi:water-percent
                icon_color: >-
                  {% set h = states('sensor.espcure_chamber_humidity') |
                  float(0) %}{% if h >= 80 %}red{% elif h >= 68 %}orange{% else
                  %}blue{% endif %}
                layout: vertical
                card_mod:
                  style: |
                    ha-card { border-radius: 16px; }
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.espcure_dew_point') | float(0) | round(1) }} °C"
                secondary: Dew Point
                icon: mdi:thermometer-water
                icon_color: teal
                layout: vertical
                card_mod:
                  style: |
                    ha-card { border-radius: 16px; }

          # 24 h temperature / dew-point trend
          - type: custom:mini-graph-card
            name: Temp & Dew Point — 24 h
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            animate: true
            show:
              fill: fade
            entities:
              - entity: sensor.espcure_chamber_temperature
                name: Temp
                color: "#ff9800"
              - entity: sensor.espcure_dew_point
                name: Dew Point
                color: "#00bcd4"

          # Humidity — interactive range (1h/6h/12h/24h)
          - type: custom:plotly-graph
            title: Humidity
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.espcure_chamber_humidity
                name: RH
                line:
                  color: "#2196f3"
                  width: 3
            layout:
              height: 300
              xaxis:
                rangeselector:
                  buttons:
                    - step: hour
                      count: 1
                      label: 1h
                      stepmode: backward
                    - step: hour
                      count: 6
                      label: 6h
                      stepmode: backward
                    - step: hour
                      count: 12
                      label: 12h
                      stepmode: backward
                    - step: hour
                      count: 24
                      label: 24h
                      stepmode: backward

      # ── Dew-point control ───────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Dew-Point Control
            heading_style: title
            icon: mdi:water-thermometer

          # Dew point vs setpoint, with the Peltier duty underneath
          - type: custom:apexcharts-card
            header:
              show: true
              title: Dew Point vs Setpoint
              show_states: true
              colorize_states: true
            graph_span: 24h
            yaxis:
              - id: temp
                decimals: 1
                apex_config:
                  title:
                    text: °C
              - id: duty
                opposite: true
                min: 0
                max: 100
                decimals: 0
            series:
              - entity: sensor.espcure_dew_point
                name: Dew Point
                yaxis_id: temp
                stroke_width: 3
                color: "#00bcd4"
              - entity: number.espcure_dew_point_setpoint
                name: Setpoint
                yaxis_id: temp
                stroke_width: 2
                curve: stepline
                color: "#9e9e9e"
              - entity: sensor.espcure_peltier_dehumidify_duty
                name: Peltier
                yaxis_id: duty
                type: area
                curve: stepline
                opacity: 0.12
                stroke_width: 1
                color: "#3f51b5"

          # Setpoint + mode controls (Mushroom number cards)
          - type: custom:mushroom-number-card
            entity: number.espcure_dew_point_setpoint
            name: Dew Point Setpoint
            icon: mdi:target
            display_mode: buttons
          - type: custom:mushroom-entity-card
            entity: switch.espcure_dew_point_control_mode
            name: Dew Point Mode
            icon: mdi:thermometer-water
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Dew Point Error
            secondary: "{{ states('sensor.espcure_dew_point_error') | float(0) | round(1) }} °C vs setpoint"
            icon: mdi:plus-minus-variant
            icon_color: >-
              {% set e = states('sensor.espcure_dew_point_error') | float(0)
              %}{% if e > 0.3 %}orange{% elif e < -0.3 %}blue{% else %}green{%
              endif %}

      # ── Temperature (PID) ───────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Temperature
            heading_style: title
            icon: mdi:thermometer-lines
          - type: custom:mushroom-climate-card
            entity: climate.espcure_temperature_control
            name: Chamber PID
            hvac_modes:
              - heat
              - "off"
            show_temperature_control: true
            collapsible_controls: false
          - type: custom:mini-graph-card
            name: Heater vs Peltier — 6 h
            hours_to_show: 6
            points_per_hour: 12
            line_width: 2
            entities:
              - entity: sensor.espcure_pid_heat_output
                name: Heat %
                color: "#f44336"
              - entity: sensor.espcure_peltier_dehumidify_duty
                name: Peltier %
                color: "#3f51b5"

  # ══════════════════════════════════════════════════════════════════════════
  # PROGRAMS
  # ══════════════════════════════════════════════════════════════════════════
  - title: Programs
    path: programs
    icon: mdi:sprout
    type: sections
    max_columns: 2
    sections:
      # ── 10-Day Dry ──────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: 10-Day Dry
            heading_style: title
            icon: mdi:sprout

          - type: custom:mushroom-entity-card
            entity: switch.espcure_10_day_dry_program
            name: 10-Day Dry Program
            icon: mdi:sprout
            tap_action:
              action: toggle

          # Circular progress — only while the program runs
          - type: conditional
            conditions:
              - entity: switch.espcure_10_day_dry_program
                state: "on"
            card:
              type: custom:apexcharts-card
              chart_type: radialBar
              header:
                show: true
                title: Dry Progress
              series:
                - entity: number.espcure_10_day_program_day
                  name: Day
                  min: 0
                  max: 10
                  color: "#4caf50"
              apex_config:
                plotOptions:
                  radialBar:
                    dataLabels:
                      value:
                        formatter: |
                          EVAL:function(v){ return Math.round(v/10) + ' / 10 days'; }

          - type: custom:mushroom-template-card
            primary: Status
            secondary: "{{ states('sensor.espcure_10_day_program_status') }}"
            icon: mdi:information-outline
            icon_color: green

      # ── Humidity trend ──────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: History
            heading_style: title
            icon: mdi:chart-line
          - type: custom:mini-graph-card
            name: Humidity — 7 days
            hours_to_show: 168
            points_per_hour: 1
            line_width: 2
            show:
              fill: fade
            entities:
              - entity: sensor.espcure_chamber_humidity
                name: RH
                color: "#2196f3"

  # ══════════════════════════════════════════════════════════════════════════
  # TUNING & DIAGNOSTICS
  # ══════════════════════════════════════════════════════════════════════════
  - title: Tuning
    path: tuning
    icon: mdi:tune
    type: sections
    max_columns: 2
    sections:
      # ── PID ─────────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: PID Tuning
            heading_style: title
            icon: mdi:chart-bell-curve
          - type: custom:mushroom-number-card
            entity: number.espcure_pid_kp
            name: Kp — Proportional
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.espcure_pid_ki
            name: Ki — Integral
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.espcure_pid_kd
            name: Kd — Derivative
            display_mode: buttons
          - type: custom:mushroom-entity-card
            entity: button.espcure_pid_autotune
            name: Run PID Autotune
            icon: mdi:auto-fix
            tap_action:
              action: toggle
          - type: custom:apexcharts-card
            header:
              show: true
              title: PID Output — 4 h
              show_states: true
            graph_span: 4h
            series:
              - entity: sensor.espcure_pid_heat_output
                name: Heat %
                color: "#f44336"
              - entity: sensor.espcure_pid_integral
                name: Integral
                color: "#9c27b0"

      # ── Safety limits ───────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Safety Limits
            heading_style: title
            icon: mdi:shield-alert
          - type: custom:mushroom-number-card
            entity: number.espcure_min_chamber_temperature_frost_floor
            name: Frost Floor
            icon: mdi:snowflake-alert
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.espcure_max_chamber_temperature_safety_ceiling
            name: Max Chamber Temp
            icon: mdi:fire-alert
            display_mode: buttons
          - type: custom:mushroom-template-card
            primary: Frost Guard
            secondary: >-
              {{ 'ACTIVE — Peltier suspended' if
              is_state('binary_sensor.espcure_frost_floor_active', 'on') else
              'Normal' }}
            icon: mdi:snowflake-alert
            icon_color: >-
              {{ 'cyan' if
              is_state('binary_sensor.espcure_frost_floor_active', 'on') else
              'grey' }}
          - type: custom:mushroom-entity-card
            entity: switch.espcure_chamber_fans
            name: Chamber Fans
            icon: mdi:fan
          - type: custom:mushroom-entity-card
            entity: switch.espcure_status_led_enable
            name: Status LED
            icon: mdi:led-on

      # ── Device ──────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Device
            heading_style: title
            icon: mdi:chip
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.espcure_ip_address
                icon: mdi:ip-network
              - type: entity
                entity: sensor.espcure_uptime
                icon: mdi:clock-outline
              - type: template
                entity: sensor.espcure_firmware_version
                icon: mdi:tag-outline
                content: "v{{ states('sensor.espcure_firmware_version') }}"
          - type: custom:mini-graph-card
            name: WiFi Signal — 24 h
            hours_to_show: 24
            points_per_hour: 2
            line_width: 2
            entities:
              - entity: sensor.espcure_wifi_signal
                name: dBm
                color: "#607d8b"
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: button.espcure_clear_sensor_condensation
                name: Clear Condensation
                icon: mdi:heat-wave
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: button.espcure_restart_controller
                name: Restart
                icon: mdi:restart
                tap_action:
                  action: toggle
