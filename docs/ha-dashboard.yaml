# EspCure — Home Assistant Lovelace Dashboard
#
# Full featured dashboard. Uses only built-in HA cards — no HACS required.
#
# Import: Settings → Dashboards → Add Dashboard → toggle "Show code editor"
# and paste this YAML, or add under views: in your existing lovelace config.
#
# Entity prefix: espcure  (change if you renamed the device in ESPHome)

title: EspCure
path: espcure
icon: mdi:cannabis
theme: default

views:
  # ── Overview (main tab) ───────────────────────────────────────────────────
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    badges: []
    cards:

      # ── Offline warning (only visible when device is offline) ─────────────
      - type: conditional
        conditions:
          - entity: binary_sensor.espcure_controller_online
            state: "off"
        card:
          type: markdown
          content: >
            ## ⚠️ EspCure Offline
            The controller is not responding. Check power and WiFi.
            Last seen IP: **{{ states('sensor.espcure_ip_address') }}**

      # ── Status strip ─────────────────────────────────────────────────────
      - type: entities
        entities:
          - entity: sensor.espcure_chamber_status
            name: Chamber Status
            icon: mdi:information-outline
          - entity: sensor.espcure_humidity_control_mode
            name: Humidity Control Mode
            icon: mdi:water-check
          - entity: binary_sensor.espcure_controller_online
            name: Controller Online
        show_header_toggle: false
        card_mod:
          style: |
            ha-card { border-radius: 12px; }

      # ── Primary sensor gauges ─────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.espcure_chamber_temperature
            name: Temp
            min: 0
            max: 30
            needle: true
            severity:
              green: 10
              yellow: 18
              red: 24
            unit: "°C"

          - type: gauge
            entity: sensor.espcure_chamber_humidity
            name: RH
            min: 40
            max: 95
            needle: true
            severity:
              green: 58
              yellow: 75
              red: 83
            unit: "%"

          - type: gauge
            entity: sensor.espcure_dew_point
            name: Dew Pt
            min: 2
            max: 20
            needle: true
            severity:
              green: 9
              yellow: 13
              red: 16
            unit: "°C"

      # ── Secondary metrics ─────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: statistic
            entity: sensor.espcure_vapor_pressure_deficit
            name: VPD
            period:
              fixed_period:
                start: P0D
                end: P0D
            stat_type: state

          - type: entity
            entity: sensor.espcure_chamber_temperature_f
            name: "Temp (°F)"
            icon: mdi:thermometer

          - type: entity
            entity: binary_sensor.espcure_frost_floor_active
            name: Frost Guard
            icon: mdi:snowflake-alert

      # ── Climate + Frost floor ─────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.espcure_chamber_temperature
            name: Chamber PID
            features:
              - type: climate-hvac-modes
                hvac_modes:
                  - heat_cool
                  - "off"

          - type: entities
            title: Frost Floor
            entities:
              - entity: number.espcure_min_chamber_temperature_frost_floor
                name: Frost Floor Temp
              - entity: binary_sensor.espcure_frost_floor_active
                name: Active
              - entity: sensor.espcure_pid_cool_output
                name: Cool Output
              - entity: sensor.espcure_pid_heat_output
                name: Heat Output

      # ── Temperature history ───────────────────────────────────────────────
      - type: history-graph
        title: Temperature — Last 24 Hours
        hours_to_show: 24
        logarithmic_scale: false
        entities:
          - entity: sensor.espcure_chamber_temperature
            name: Temp °C
          - entity: sensor.espcure_dew_point
            name: Dew Point °C

      # ── Humidity history ──────────────────────────────────────────────────
      - type: history-graph
        title: Humidity & VPD — Last 24 Hours
        hours_to_show: 24
        entities:
          - entity: sensor.espcure_chamber_humidity
            name: RH %
          - entity: sensor.espcure_vapor_pressure_deficit
            name: VPD kPa


  # ── Programs & Control ────────────────────────────────────────────────────
  - title: Programs
    path: programs
    icon: mdi:sprout
    cards:

      # ── One-tap profile presets ───────────────────────────────────────────
      - type: entities
        title: Quick Profiles
        icon: mdi:lightning-bolt
        entities:
          - entity: button.espcure_apply_dry_profile
            name: Apply Dry Profile (68°F / 12.2°C DP)
            action_name: Apply
          - entity: button.espcure_apply_cure_profile
            name: Apply Cure Profile (68°F / 11.1°C DP)
            action_name: Apply
          - entity: button.espcure_apply_cold_plate_profile
            name: Apply Cold-Plate Profile (55°F / RH mode)
            action_name: Apply

      # ── 18-day program ────────────────────────────────────────────────────
      - type: entities
        title: 18-Day Step-Down Program
        icon: mdi:sprout
        entities:
          - entity: switch.espcure_cure_program_18_day
            name: Enable 18-Day Program
          - entity: sensor.espcure_cure_program_status
            name: Status
          - entity: number.espcure_cure_program_day
            name: Current Day
          - entity: number.espcure_humidity_setpoint
            name: Humidity Setpoint (%)
          - entity: number.espcure_humidity_hysteresis
            name: Humidity Hysteresis (%)
          - entity: sensor.espcure_humidity_error
            name: RH Error

      # ── Cannatrol 4+4 program ─────────────────────────────────────────────
      - type: entities
        title: Cannatrol 4+4 Program
        icon: mdi:cannabis
        entities:
          - entity: switch.espcure_cannatrol_4_4_program
            name: Enable Cannatrol 4+4
          - entity: sensor.espcure_cannatrol_program_status
            name: Status
          - entity: number.espcure_cannatrol_program_day
            name: Current Day
          - entity: switch.espcure_dew_point_control_mode
            name: Dew Point Control Mode
          - entity: number.espcure_dew_point_setpoint
            name: Dew Point Setpoint (°C)
          - entity: number.espcure_dew_point_hysteresis
            name: Dew Point Hysteresis (°C)
          - entity: sensor.espcure_dew_point_error
            name: Dew Point Error

      # ── 7-day history ─────────────────────────────────────────────────────
      - type: history-graph
        title: Humidity — Last 7 Days
        hours_to_show: 168
        entities:
          - entity: sensor.espcure_chamber_humidity
            name: RH %


  # ── Outputs & Safety ──────────────────────────────────────────────────────
  - title: Outputs
    path: outputs
    icon: mdi:electric-switch
    cards:

      # ── Output states ─────────────────────────────────────────────────────
      - type: entities
        title: Relay Outputs
        icon: mdi:electric-switch
        entities:
          - entity: switch.espcure_chamber_fans
            name: Chamber Fans (GPIO5)
          - entity: switch.espcure_dehumidifier
            name: Dehumidifier Relay (GPIO23)
          - type: divider
          - entity: sensor.espcure_pid_cool_output
            name: Peltier TEC Output (GPIO18)
          - entity: sensor.espcure_pid_heat_output
            name: Heater Output (GPIO19)

      # ── Output history ────────────────────────────────────────────────────
      - type: history-graph
        title: PID Outputs — Last 24 Hours
        hours_to_show: 24
        entities:
          - entity: sensor.espcure_pid_cool_output
            name: Cool %
          - entity: sensor.espcure_pid_heat_output
            name: Heat %

      # ── Frost protection ──────────────────────────────────────────────────
      - type: entities
        title: Frost Protection
        icon: mdi:snowflake-alert
        entities:
          - entity: binary_sensor.espcure_frost_floor_active
            name: Frost Guard Active
          - entity: number.espcure_min_chamber_temperature_frost_floor
            name: Frost Floor (°C)

      # ── Safety notice ─────────────────────────────────────────────────────
      - type: markdown
        content: >
          ### Safety Notes

          - **Fans** run continuously at boot (`RESTORE_DEFAULT_ON`). Do not disable
            fans unless the chamber is empty — TEC hot-side cooling depends on airflow.
          - **SSR-40 DD** relays must be on heatsinks when carrying > 5 A.
          - **Peltier switching** uses `slow_pwm` (20 s period). The minimum safe
            period is 10 s — do not reduce this.
          - **Frost guard** monitors chamber *air* temperature. If ice forms on the
            Peltier fins, raise the Frost Floor setpoint.


  # ── PID Tuning ─────────────────────────────────────────────────────────────
  - title: PID
    path: pid
    icon: mdi:chart-bell-curve
    cards:

      # ── Live coefficient sliders ──────────────────────────────────────────
      - type: entities
        title: PID Coefficients (Live Tuning)
        icon: mdi:tune
        entities:
          - entity: number.espcure_pid_kp
            name: Kp — Proportional
          - entity: number.espcure_pid_ki
            name: Ki — Integral
          - entity: number.espcure_pid_kd
            name: Kd — Derivative
          - type: divider
          - entity: button.espcure_pid_autotune
            name: Run PID Autotune
            action_name: Start
          - type: section
            label: "Changes apply instantly — no reflash needed"

      # ── PID state ─────────────────────────────────────────────────────────
      - type: entities
        title: PID State
        icon: mdi:chart-line
        entities:
          - entity: sensor.espcure_pid_cool_output
            name: Cool Output
          - entity: sensor.espcure_pid_heat_output
            name: Heat Output
          - entity: sensor.espcure_pid_integral
            name: Integral Term
          - type: divider
          - entity: climate.espcure_chamber_temperature
            name: Climate Entity

      # ── PID output history ────────────────────────────────────────────────
      - type: history-graph
        title: PID Outputs — Last 4 Hours
        hours_to_show: 4
        entities:
          - entity: sensor.espcure_pid_cool_output
            name: Cool %
          - entity: sensor.espcure_pid_heat_output
            name: Heat %
          - entity: sensor.espcure_pid_integral
            name: Integral

      # ── Tuning reference ──────────────────────────────────────────────────
      - type: markdown
        content: >
          ### Quick Tuning Reference

          | Symptom | Fix |
          |---|---|
          | Oscillates ±2 °C | Reduce Kp 20–30 % |
          | Overshoots, slow recovery | Reduce Ki; check Integral value |
          | Steady-state offset | Increase Ki |
          | Very slow approach (> 2 h) | Increase Kp 25 % |
          | Spiky output | Increase `derivative_averaging_samples` in YAML |

          After tuning: update `control_parameters` in `espcure.yaml` to match
          and log in `docs/pid-tuning.md`.


  # ── Diagnostics ───────────────────────────────────────────────────────────
  - title: Diagnostics
    path: diagnostics
    icon: mdi:information
    cards:

      # ── Device info ───────────────────────────────────────────────────────
      - type: entities
        title: Device
        icon: mdi:chip
        entities:
          - entity: binary_sensor.espcure_controller_online
            name: Controller Online
          - entity: sensor.espcure_ip_address
            name: IP Address
          - entity: sensor.espcure_wifi_signal
            name: WiFi Signal (dBm)
          - entity: sensor.espcure_uptime
            name: Uptime

      # ── Sensor diagnostics ────────────────────────────────────────────────
      - type: entities
        title: Sensor Diagnostics
        icon: mdi:thermometer-lines
        entities:
          - entity: sensor.espcure_humidity_error
            name: RH Error (vs setpoint)
          - entity: sensor.espcure_dew_point_error
            name: Dew Point Error (vs setpoint)
          - type: divider
          - entity: sensor.espcure_chamber_temperature
            name: Chamber Temp (°C)
          - entity: sensor.espcure_chamber_temperature_f
            name: Chamber Temp (°F)

      # ── Actions ───────────────────────────────────────────────────────────
      - type: entities
        title: Actions
        icon: mdi:wrench
        entities:
          - entity: button.espcure_clear_sensor_condensation
            name: Clear Sensor Condensation
            action_name: Run
          - entity: button.espcure_restart_controller
            name: Restart Controller
            action_name: Restart

      # ── WiFi history ──────────────────────────────────────────────────────
      - type: history-graph
        title: WiFi Signal — Last 24 Hours
        hours_to_show: 24
        entities:
          - entity: sensor.espcure_wifi_signal
            name: WiFi dBm

      # ── Web UI link ───────────────────────────────────────────────────────
      - type: markdown
        content: >
          ### Device Web UI

          Browse directly to the controller for a full dashboard without Home Assistant:

          **[http://espcure.local](http://espcure.local)**

          The web UI runs from the ESP32's flash — works on any device on your local
          network. Dark mode toggle in the top-right corner.
